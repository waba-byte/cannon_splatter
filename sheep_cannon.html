<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Sheep Cannon 🐑</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #87CEEB;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: 'Arial Rounded MT Bold', Arial, sans-serif;
    overflow: hidden;
  }
  #ui {
    display: flex;
    gap: 30px;
    margin-bottom: 10px;
    align-items: center;
  }
  .stat {
    background: rgba(255,255,255,0.8);
    padding: 6px 18px;
    border-radius: 20px;
    font-size: 18px;
    font-weight: bold;
    color: #333;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
  }
  #canvas {
    border-radius: 12px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.3);
    cursor: crosshair;
  }
  #instructions {
    margin-top: 10px;
    background: rgba(255,255,255,0.7);
    padding: 6px 20px;
    border-radius: 20px;
    font-size: 14px;
    color: #444;
  }
  #powerBar {
    width: 200px;
    height: 22px;
    background: #ddd;
    border-radius: 11px;
    overflow: hidden;
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
  }
  #powerFill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #4CAF50, #FFEB3B, #F44336);
    border-radius: 11px;
    transition: width 0.05s;
  }
  .power-label { font-size: 14px; color: #555; }
</style>
</head>
<body>

<div id="ui">
  <div class="stat">🐑 Pecore: <span id="sheepCount">5</span></div>
  <div class="stat">🎯 Bersagli: <span id="targetCount">0</span></div>
  <div class="stat">⭐ Punti: <span id="score">0</span></div>
  <div>
    <div class="power-label">Potenza:</div>
    <div id="powerBar"><div id="powerFill"></div></div>
  </div>
</div>

<canvas id="canvas" width="900" height="500"></canvas>
<div id="instructions">🖱️ Muovi il mouse per mirare | Tieni premuto SPAZIO o click sinistro per caricare | Rilascia per sparare</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// Game state
let sheep = [];
let targets = [];
let particles = [];
let clouds = [];
let score = 0;
let sheepLeft = 5;
let angle = -45;
let power = 0;
let charging = false;
let gameOver = false;
let victory = false;
let mouseX = W, mouseY = 0;

// Cannon position
const cannonX = 80, cannonY = H - 80;

// Ground
const groundY = H - 50;

// Init clouds
for (let i = 0; i < 5; i++) {
  clouds.push({
    x: Math.random() * W,
    y: 30 + Math.random() * 80,
    speed: 0.2 + Math.random() * 0.3,
    size: 40 + Math.random() * 40
  });
}

// Init targets
function createTargets() {
  targets = [];
  // Level layout: stacks of boxes with pigs
  const layouts = [
    { x: 600, y: groundY - 40, w: 50, h: 40, hp: 2 },
    { x: 660, y: groundY - 40, w: 50, h: 40, hp: 2 },
    { x: 720, y: groundY - 40, w: 50, h: 40, hp: 2 },
    { x: 630, y: groundY - 90, w: 50, h: 40, hp: 3 },
    { x: 690, y: groundY - 90, w: 50, h: 40, hp: 3 },
    { x: 660, y: groundY - 140, w: 50, h: 40, hp: 4 },
    { x: 820, y: groundY - 40, w: 50, h: 40, hp: 2 },
  ];
  targets = layouts.map(t => ({ ...t, alive: true, shake: 0 }));
  document.getElementById('targetCount').textContent = targets.length;
}
createTargets();

// Input
document.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouseX = e.clientX - rect.left;
  mouseY = e.clientY - rect.top;
  const dx = mouseX - cannonX;
  const dy = mouseY - cannonY;
  angle = Math.atan2(dy, dx) * 180 / Math.PI;
  if (angle > -5) angle = -5;
  if (angle < -85) angle = -85;
});

document.addEventListener('mousedown', e => { if (e.button === 0 && !gameOver) startCharge(); });
document.addEventListener('mouseup', e => { if (e.button === 0) shoot(); });
document.addEventListener('keydown', e => { if (e.code === 'Space' && !charging && !gameOver) { e.preventDefault(); startCharge(); } });
document.addEventListener('keyup', e => { if (e.code === 'Space') shoot(); });

function startCharge() {
  if (sheepLeft <= 0) return;
  charging = true;
  power = 0;
}

function shoot() {
  if (!charging) return;
  charging = false;
  if (sheepLeft <= 0 || power < 5) { power = 0; return; }

  const rad = angle * Math.PI / 180;
  const speed = power * 0.18;
  sheep.push({
    x: cannonX + Math.cos(rad) * 55,
    y: cannonY + Math.sin(rad) * 55,
    vx: Math.cos(rad) * speed,
    vy: Math.sin(rad) * speed,
    r: 18,
    bounces: 0,
    trail: [],
    alive: true,
    spinAngle: 0,
    landed: false
  });

  sheepLeft--;
  document.getElementById('sheepCount').textContent = sheepLeft;
  power = 0;
}

function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = 2 + Math.random() * 5;
    particles.push({
      x, y,
      vx: Math.cos(a) * s,
      vy: Math.sin(a) * s - 3,
      life: 1,
      color,
      size: 4 + Math.random() * 6
    });
  }
}

function drawClouds() {
  clouds.forEach(c => {
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.beginPath();
    ctx.arc(c.x, c.y, c.size, 0, Math.PI * 2);
    ctx.arc(c.x + c.size * 0.6, c.y - c.size * 0.3, c.size * 0.7, 0, Math.PI * 2);
    ctx.arc(c.x - c.size * 0.5, c.y, c.size * 0.6, 0, Math.PI * 2);
    ctx.fill();
    c.x += c.speed;
    if (c.x > W + 100) c.x = -100;
  });
}

function drawGround() {
  // Sky gradient
  const skyGrad = ctx.createLinearGradient(0, 0, 0, groundY);
  skyGrad.addColorStop(0, '#87CEEB');
  skyGrad.addColorStop(1, '#B0E0E6');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, groundY);

  // Ground
  const groundGrad = ctx.createLinearGradient(0, groundY, 0, H);
  groundGrad.addColorStop(0, '#4CAF50');
  groundGrad.addColorStop(0.3, '#388E3C');
  groundGrad.addColorStop(1, '#2E7D32');
  ctx.fillStyle = groundGrad;
  ctx.fillRect(0, groundY, W, H - groundY);

  // Grass tufts
  ctx.fillStyle = '#66BB6A';
  for (let x = 10; x < W; x += 25) {
    ctx.beginPath();
    ctx.ellipse(x, groundY, 8, 5, 0, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawCannon() {
  const rad = angle * Math.PI / 180;

  // Wheels
  ctx.fillStyle = '#5D4037';
  ctx.beginPath();
  ctx.arc(cannonX - 5, cannonY + 20, 22, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#795548';
  ctx.beginPath();
  ctx.arc(cannonX - 5, cannonY + 20, 16, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#5D4037';
  ctx.lineWidth = 3;
  for (let i = 0; i < 6; i++) {
    const a = (i / 6) * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(cannonX - 5 + Math.cos(a) * 5, cannonY + 20 + Math.sin(a) * 5);
    ctx.lineTo(cannonX - 5 + Math.cos(a) * 16, cannonY + 20 + Math.sin(a) * 16);
    ctx.stroke();
  }

  // Base
  ctx.fillStyle = '#546E7A';
  ctx.beginPath();
  ctx.ellipse(cannonX, cannonY + 10, 28, 14, 0, 0, Math.PI * 2);
  ctx.fill();

  // Barrel
  ctx.save();
  ctx.translate(cannonX, cannonY);
  ctx.rotate(rad);
  const barrelGrad = ctx.createLinearGradient(0, -14, 0, 14);
  barrelGrad.addColorStop(0, '#78909C');
  barrelGrad.addColorStop(0.5, '#455A64');
  barrelGrad.addColorStop(1, '#263238');
  ctx.fillStyle = barrelGrad;
  ctx.beginPath();
  ctx.roundRect(0, -14, 65, 28, 8);
  ctx.fill();
  ctx.strokeStyle = '#37474F';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Barrel end ring
  ctx.fillStyle = '#37474F';
  ctx.beginPath();
  ctx.ellipse(65, 0, 5, 14, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawSheep(s) {
  ctx.save();
  ctx.translate(s.x, s.y);
  ctx.rotate(s.spinAngle);

  // Trail
  s.trail.forEach((t, i) => {
    const a = (i / s.trail.length) * 0.3;
    ctx.fillStyle = `rgba(255,255,255,${a})`;
    ctx.beginPath();
    ctx.arc(t.x - s.x, t.y - s.y, s.r * 0.6 * (i / s.trail.length), 0, Math.PI * 2);
    ctx.fill();
  });

  // Body (wool)
  ctx.fillStyle = '#F5F5F5';
  ctx.shadowColor = 'rgba(0,0,0,0.2)';
  ctx.shadowBlur = 5;
  ctx.beginPath();
  ctx.arc(0, 0, s.r, 0, Math.PI * 2);
  ctx.fill();

  // Wool texture bumps
  ctx.fillStyle = '#E0E0E0';
  ctx.shadowBlur = 0;
  const bumps = [[-8, -8], [8, -8], [0, -12], [-12, 2], [12, 2], [-6, 10], [6, 10]];
  bumps.forEach(([bx, by]) => {
    ctx.beginPath();
    ctx.arc(bx, by, 6, 0, Math.PI * 2);
    ctx.fill();
  });

  // Face
  ctx.fillStyle = '#FFCC80';
  ctx.beginPath();
  ctx.ellipse(s.r * 0.5, 0, 9, 8, 0.3, 0, Math.PI * 2);
  ctx.fill();

  // Eyes
  ctx.fillStyle = '#222';
  ctx.beginPath();
  ctx.arc(s.r * 0.55 + 2, -3, 2, 0, Math.PI * 2);
  ctx.fill();

  // Mouth (surprised)
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(s.r * 0.6, 3, 3, 0, Math.PI);
  ctx.stroke();

  // Legs (when on ground)
  if (s.landed) {
    ctx.strokeStyle = '#795548';
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    [[-8, 12], [-3, 14], [3, 14], [8, 12]].forEach(([lx, ly]) => {
      ctx.beginPath();
      ctx.moveTo(lx, 8);
      ctx.lineTo(lx, ly);
      ctx.stroke();
    });
  }

  ctx.restore();
}

function drawTarget(t) {
  if (!t.alive) return;
  const sx = t.shake > 0 ? (Math.random() - 0.5) * t.shake * 4 : 0;

  // Box/structure
  const boxGrad = ctx.createLinearGradient(t.x + sx, t.y, t.x + sx + t.w, t.y + t.h);
  boxGrad.addColorStop(0, '#8D6E63');
  boxGrad.addColorStop(1, '#6D4C41');
  ctx.fillStyle = boxGrad;
  ctx.fillRect(t.x + sx, t.y, t.w, t.h);

  ctx.strokeStyle = '#4E342E';
  ctx.lineWidth = 2;
  ctx.strokeRect(t.x + sx, t.y, t.w, t.h);

  // Wood grain lines
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 1;
  for (let gy = t.y + 8; gy < t.y + t.h; gy += 10) {
    ctx.beginPath();
    ctx.moveTo(t.x + sx + 4, gy);
    ctx.lineTo(t.x + sx + t.w - 4, gy);
    ctx.stroke();
  }

  // Pig face on top box
  const px = t.x + sx + t.w / 2;
  const py = t.y + 16;

  ctx.fillStyle = '#AED581';
  ctx.beginPath();
  ctx.arc(px, py, 14, 0, Math.PI * 2);
  ctx.fill();

  // Pig snout
  ctx.fillStyle = '#C5E1A5';
  ctx.beginPath();
  ctx.ellipse(px, py + 5, 7, 5, 0, 0, Math.PI * 2);
  ctx.fill();

  // Nostrils
  ctx.fillStyle = '#558B2F';
  ctx.beginPath(); ctx.arc(px - 3, py + 5, 1.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(px + 3, py + 5, 1.5, 0, Math.PI * 2); ctx.fill();

  // Eyes
  ctx.fillStyle = '#333';
  ctx.beginPath(); ctx.arc(px - 5, py - 3, 2.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(px + 5, py - 3, 2.5, 0, Math.PI * 2); ctx.fill();

  // HP indicator
  if (t.hp > 1) {
    ctx.fillStyle = '#F44336';
    for (let h = 0; h < t.hp - 1; h++) {
      ctx.beginPath();
      ctx.arc(t.x + sx + 8 + h * 12, t.y - 8, 4, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  if (t.shake > 0) t.shake -= 0.3;
}

function drawParticles() {
  particles.forEach(p => {
    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.life;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function drawPowerIndicator() {
  if (!charging) return;

  // Trajectory preview
  const rad = angle * Math.PI / 180;
  const speed = power * 0.18;
  let px = cannonX + Math.cos(rad) * 55;
  let py = cannonY + Math.sin(rad) * 55;
  let pvx = Math.cos(rad) * speed;
  let pvy = Math.sin(rad) * speed;

  ctx.setLineDash([6, 6]);
  ctx.strokeStyle = 'rgba(255,255,255,0.6)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(px, py);
  for (let i = 0; i < 40; i++) {
    pvy += 0.25;
    px += pvx;
    py += pvy;
    if (py > groundY) break;
    ctx.lineTo(px, py);
  }
  ctx.stroke();
  ctx.setLineDash([]);

  document.getElementById('powerFill').style.width = power + '%';
}

function update() {
  if (gameOver) return;

  // Charge power
  if (charging) {
    power = Math.min(100, power + 1.5);
  }

  // Update sheep
  sheep.forEach(s => {
    if (!s.alive) return;

    s.trail.push({ x: s.x, y: s.y });
    if (s.trail.length > 8) s.trail.shift();

    s.vy += 0.25; // gravity
    s.x += s.vx;
    s.y += s.vy;
    s.spinAngle += 0.15;

    // Ground collision
    if (s.y + s.r >= groundY) {
      s.y = groundY - s.r;
      s.vy *= -0.4;
      s.vx *= 0.7;
      s.bounces++;
      spawnParticles(s.x, s.y + s.r, '#4CAF50', 6);

      if (Math.abs(s.vy) < 1) {
        s.vy = 0;
        s.vx = 0;
        s.landed = true;
        s.spinAngle = 0;
      }
    }

    // Wall
    if (s.x - s.r < 0) { s.x = s.r; s.vx *= -0.6; }
    if (s.x + s.r > W) { s.x = W - s.r; s.vx *= -0.6; }

    // Target collision
    targets.forEach(t => {
      if (!t.alive) return;
      if (s.x + s.r > t.x && s.x - s.r < t.x + t.w &&
          s.y + s.r > t.y && s.y - s.r < t.y + t.h) {
        t.hp--;
        t.shake = 3;
        spawnParticles(s.x, s.y, '#FF7043', 12);
        s.vx *= -0.5;
        s.vy *= -0.6;

        if (t.hp <= 0) {
          t.alive = false;
          score += 100;
          spawnParticles(t.x + t.w / 2, t.y + t.h / 2, '#FFEB3B', 20);
          spawnParticles(t.x + t.w / 2, t.y + t.h / 2, '#FF5722', 15);
          document.getElementById('score').textContent = score;
          const remaining = targets.filter(t => t.alive).length;
          document.getElementById('targetCount').textContent = remaining;

          if (remaining === 0) {
            victory = true;
            gameOver = true;
          }
        }
      }
    });
  });

  // Update particles
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.15;
    p.life -= 0.025;
  });
  particles = particles.filter(p => p.life > 0);

  // Check if no sheep left and no more in flight
  if (sheepLeft <= 0 && sheep.every(s => s.landed || !s.alive)) {
    const remaining = targets.filter(t => t.alive).length;
    if (remaining > 0) {
      setTimeout(() => { gameOver = true; }, 500);
    }
  }
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center';
  if (victory) {
    ctx.fillStyle = '#FFEB3B';
    ctx.font = 'bold 60px Arial';
    ctx.fillText('🎉 VITTORIA! 🎉', W / 2, H / 2 - 40);
    ctx.fillStyle = '#fff';
    ctx.font = '28px Arial';
    ctx.fillText(`Punteggio finale: ${score}`, W / 2, H / 2 + 20);
  } else {
    ctx.fillStyle = '#FF5252';
    ctx.font = 'bold 60px Arial';
    ctx.fillText('💥 GAME OVER 💥', W / 2, H / 2 - 40);
    ctx.fillStyle = '#fff';
    ctx.font = '28px Arial';
    const remaining = targets.filter(t => t.alive).length;
    ctx.fillText(`Bersagli rimasti: ${remaining} | Punti: ${score}`, W / 2, H / 2 + 20);
  }

  ctx.fillStyle = '#4FC3F7';
  ctx.font = 'bold 24px Arial';
  ctx.fillText('Premi R per ricominciare', W / 2, H / 2 + 80);
}

document.addEventListener('keydown', e => {
  if (e.code === 'KeyR' && gameOver) restartGame();
});

canvas.addEventListener('dblclick', () => {
  if (gameOver) restartGame();
});

function restartGame() {
  sheep = [];
  particles = [];
  score = 0;
  sheepLeft = 5;
  power = 0;
  charging = false;
  gameOver = false;
  victory = false;
  document.getElementById('sheepCount').textContent = sheepLeft;
  document.getElementById('score').textContent = score;
  createTargets();
}

function gameLoop() {
  ctx.clearRect(0, 0, W, H);
  drawGround();
  drawClouds();
  drawParticles();
  targets.forEach(drawTarget);
  sheep.forEach(drawSheep);
  drawCannon();
  drawPowerIndicator();
  update();
  if (gameOver) drawGameOver();
  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
