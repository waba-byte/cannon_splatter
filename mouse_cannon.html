<style>

#canvas { border-radius:8px; box-shadow:0 0 50px rgba(255,0,0,0.5); cursor:crosshair; display:block; transform-origin:center center; }

/* ── touch controls overlay ── */
#tctrl { position:fixed; bottom:0; left:0; right:0; display:flex; justify-content:space-between; align-items:flex-end; padding:12px 16px; pointer-events:none; z-index:20; }

/* ── splash screen ── */

#splash img { max-width:100%; max-height:100%; object-fit:contain; display:block; }

  },

    add_lives: '+3 ЖИЗНИ', shield: 'ЩИТ', cosmetics: 'СKINS', supporter: 'СТОРОННИК',
    mouse: 'МЫШЬ', cat: 'КОШКА', monkey: 'ОБЕЗЬЯНА', pavel: 'ПАВЕЛ',
    enter_name: 'ВВЕДИТЕ ИМЯ', enter_name_q: 'Как вас зовут?', confirm: 'ПОДТВЕРДИТЬ',

    grade_s: 'S★ СУПЕР МЫШЬ', grade_a: 'A - ОТЛИЧНЫЙ ПОЛЕТ', grade_b: 'B - ХОРОШО', grade_c: 'C - ПЛОХО ДАЖЕ', grade_d: 'D - КАТАСТРОФА',
    grade_label: 'УРОВЕНЬ:', dist_record: 'Лучшая дистанция:', leaderboard_title: '🏆 ТОП 10',
    col_rank: 'РАНГ', col_name: 'ИМЯ', col_dist: 'ДИСТАНЦИЯ', col_score: 'ОЧКИ',
    replay_hint_kb: '[ R ] для переигровки', replay_hint_touch: 'Нажмите для переигровки',

    death_bird: '🐦 КЛЮНУТ!', death_plane: '✈️ СБИТ!', death_chainsaw: '⛓️ ИЗМЕЛЬЧЕН!', death_lightning: '⚡ ПОРАЖЕН!', death_stop: '😵 ОСТАНОВЛЕН!'
  }
};
let lang = localStorage.getItem('lang') || 'it';
const t = key => STRINGS[lang][key] || key;

// ─── SETTINGS STATE ────────────────────────────────────────────────────────
let sfxEnabled = JSON.parse(localStorage.getItem('sfxEnabled') ?? 'true');
let musicVol = parseInt(localStorage.getItem('musicVol') ?? '70');
let theme = localStorage.getItem('theme') || 'night';
let selectedChar = localStorage.getItem('selectedChar') || 'mouse';
let playerName = localStorage.getItem('playerName') || '';
let playerNameScreenOpen = !playerName;  // show name screen if no name saved
let charSelectOpen = !playerNameScreenOpen;  // only show char select after name
let namePromptShown = false;  // track if we've already shown the prompt
let settingsOpen = false;
let showLeaderboard = false;
let showShop = false;
let hasShield = JSON.parse(localStorage.getItem('hasShield') ?? 'false');
let extraLives = parseInt(localStorage.getItem('extraLives') ?? '0');

// ─── LEADERBOARD ──────────────────────────────────────────────────────────
function getLeaderboard() {
  const data = localStorage.getItem('leaderboard');
  return data ? JSON.parse(data) : [];
}
function saveLeaderboard(entries) {
  localStorage.setItem('leaderboard', JSON.stringify(entries));
}
function addScore(dist, kills, score, charUsed) {
  const playerName = (window.Telegram?.WebApp?.initDataUnsafe?.user?.first_name) || localStorage.getItem('playerName') || 'Giocatore';
  const entry = { name: playerName, score, dist, kills, date: new Date().toLocaleDateString('it-IT'), char: charUsed };
  let board = getLeaderboard();
  board.push(entry);
  board.sort((a,b)=>b.dist-a.dist);  // sort by distance desc
  board = board.slice(0, 10);  // keep top 10
  saveLeaderboard(board);
}

// ─── CHARACTERS ────────────────────────────────────────────────────────────
const CHARS = {
  mouse:  { get name(){ return t('mouse'); }, emoji: '🐭' },
  cat:    { get name(){ return t('cat'); }, emoji: '🐱' },
  monkey: { get name(){ return t('monkey'); }, emoji: '🐒' },
  pavel:  { get name(){ return t('pavel'); }, emoji: '👤' }
};

// ─── LEVEL GENERATION ────────────────────────────────────────────────────
const KILL_TYPES   = ['TNT','SPIKE','KNIFE','CACTUS','ACID','SAW','BEAR','BIRD','PLANE','CHAINSAW','LIGHTNING'];
const KILL_TYPES_INTRO = ['TNT','SPIKE','KNIFE','CACTUS','ACID','SAW','BEAR']; // simpler kills for first 300m
const BOUNCE_TYPES = ['SPRING','MUSHROOM','CLOUD','BALLOON'];
const RADII = { TNT:28,SPIKE:38,KNIFE:24,CACTUS:32,ACID:60,SAW:34,BEAR:30,SPRING:20,MUSHROOM:26,CLOUD:44,BALLOON:48,BIRD:20,PLANE:30,CHAINSAW:34,LIGHTNING:22 };

// Helper: pick Y coordinate based on obstacle type
function pickCy(type) {
  if(type === 'CLOUD')     return 80 + Math.random()*160;
  else if(type === 'BALLOON')  return 50 + Math.random()*200;
  else if(type === 'BIRD')     return 80 + Math.random()*200;
  else if(type === 'PLANE')    return 10 + Math.random()*80;
  else if(type === 'CHAINSAW') return 30 + Math.random()*120;
  else if(type === 'LIGHTNING') return Math.random()*120;
  else if(type === 'SAW' && Math.random()<0.5) return GY - 100 - Math.random()*120;
  else return GY;
}

// Helper: pick extra properties based on type (speed, chainsaw length)
function pickExtra(type) {
  const extra = {};
  if(type==='BIRD')  extra._spd = 1.2 + Math.random()*0.9;
  if(type==='PLANE') extra._spd = 2.2 + Math.random()*1.5;
  if(type==='CHAINSAW') extra._chainLen = 140 + Math.floor(Math.random()*90);
  return extra;
}

function genLevel() {
  obstacles = [];

  // ─── FIRST 300m ZONE: 50/50 random bumpers vs kills ─────────────────────
  const ZONE_START = 500;
  const ZONE_END = CANNON_WX + 300 * METER;  // 80 + 3600 = 3680
  let zx = ZONE_START;
  let flipKill = Math.random() < 0.5;  // randomly decide which comes first
  while(zx < ZONE_END) {
    const isKill = flipKill;
    flipKill = !flipKill;  // strict alternation = exactly 50/50
    const type = isKill
      ? KILL_TYPES_INTRO[Math.floor(Math.random()*KILL_TYPES_INTRO.length)]
      : BOUNCE_TYPES[Math.floor(Math.random()*BOUNCE_TYPES.length)];
    const cy = pickCy(type);
    obstacles.push({ type, cx:zx, cy, r:RADII[type], _drift:0, ...pickExtra(type) });
    zx += 180 + Math.random() * 200;  // 180-380px spacing
  }

  // ─── MAIN GENERATION: rest of level with full kill set ────────────────────
  let x = ZONE_END + 100;
  while(x < maxGeneratedX - 300) {
    let isKill = Math.random() < 0.5;
    let type = isKill
      ? KILL_TYPES[Math.floor(Math.random()*KILL_TYPES.length)]
      : BOUNCE_TYPES[Math.floor(Math.random()*BOUNCE_TYPES.length)];
    if(theme === 'rain' && type !== 'LIGHTNING' && Math.random() > 0.7) type = 'LIGHTNING';
    if(theme !== 'rain' && type === 'LIGHTNING') type = KILL_TYPES[Math.floor(Math.random()*KILL_TYPES.length)];

    const cy = pickCy(type);
    obstacles.push({ type, cx:x, cy, r:RADII[type], _drift:0, ...pickExtra(type) });
    x += 130 + Math.random()*180;
  }
}

function genMore(fromX) {
  let x = fromX;
  const endX = fromX + 2000;
  while(x < endX) {
    let isKill = Math.random() < 0.5;
    let type = isKill
      ? KILL_TYPES[Math.floor(Math.random()*KILL_TYPES.length)]
      : BOUNCE_TYPES[Math.floor(Math.random()*BOUNCE_TYPES.length)];
    if(theme === 'rain' && type !== 'LIGHTNING' && Math.random() > 0.7) type = 'LIGHTNING';
    if(theme !== 'rain' && type === 'LIGHTNING') type = KILL_TYPES[Math.floor(Math.random()*KILL_TYPES.length)];

    const cy = pickCy(type);
    obstacles.push({ type, cx:x, cy, r:RADII[type], _drift:0, ...pickExtra(type) });
    x += 130 + Math.random()*180;
  }
  maxGeneratedX = Math.max(maxGeneratedX, endX);
  WORLD_W = maxGeneratedX + 1000;
}

genLevel();

// stars
for(let i=0;i<200;i++) bgStars.push({ wx:Math.random()*WORLD_W, y:Math.random()*(GY*0.65), r:0.4+Math.random()*1.6, b:Math.random() });
// bats
for(let i=0;i<8;i++) bats.push({ wx:500+Math.random()*WORLD_W, y:50+Math.random()*120, spd:0.8+Math.random()*1.4, wp:Math.random()*Math.PI*2, sz:7+Math.random()*5 });
// ambient debris
for(let i=0;i<60;i++) debris.push({ wx:Math.random()*WORLD_W, y:20+Math.random()*(GY-60), vx:-(0.2+Math.random()*0.5), vy:(Math.random()-0.5)*0.15, r:1+Math.random()*2, a:0.08+Math.random()*0.2 });

// ─── CAMERA ──────────────────────────────────────────────────────────────
function updateCam() {
  if(mouse && mouse.alive){
    cam.tx = mouse.wx - W*0.5;
    cam.ty = Math.min(0, mouse.wy - H*0.5);
  } else if(animState){
    cam.tx = animState.wx - W*0.5;
    cam.ty = Math.min(0, animState.wy - H*0.5);
  } else {
    cam.tx = 0;
    cam.ty = 0;
  }
  cam.tx = Math.max(0, Math.min(WORLD_W - W, cam.tx));
  cam.ty = Math.max(-2000, Math.min(0, cam.ty));
  const lerpFactor = 0.10 + (mouse ? Math.abs(mouse.vx) * 0.008 : 0);
  cam.x += (cam.tx - cam.x) * lerpFactor;
  const _dy = cam.ty - cam.y;
  cam.y += _dy * Math.min(0.25, 0.10 + Math.abs(_dy) * 0.0004);
}
function wx(worldX) { return worldX - cam.x; } // world→screen x

// ─── DRAW BACKGROUND ─────────────────────────────────────────────────────
function drawBG() {
  let skyGrad, hillCol1, hillCol2;
  let sunX = -500, sunY = 80, sunR = 45;

  switch(theme) {
    case 'day':
      skyGrad = ctx.createLinearGradient(0,0,0,GY);
      skyGrad.addColorStop(0,'#87CEEB'); skyGrad.addColorStop(1,'#E0F0FF');
      ctx.fillStyle=skyGrad; ctx.fillRect(0,-3000,W,GY+3000);
      // sun
      ctx.fillStyle='#FFD700'; ctx.beginPath(); ctx.arc(sunX, sunY, sunR, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle='rgba(255,215,0,0.3)'; ctx.beginPath(); ctx.arc(sunX, sunY, sunR+20, 0, Math.PI*2); ctx.fill();
      hillCol1='#228B22'; hillCol2='#32CD32';
      break;
    case 'sunset':
      skyGrad = ctx.createLinearGradient(0,0,0,GY);
      skyGrad.addColorStop(0,'#FF6B35'); skyGrad.addColorStop(0.5,'#F7C59F'); skyGrad.addColorStop(1,'#1A0030');
      ctx.fillStyle=skyGrad; ctx.fillRect(0,-3000,W,GY+3000);
      // sunset sun
      ctx.fillStyle='#FF8C00'; ctx.beginPath(); ctx.arc(sunX, sunY+30, sunR+10, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle='rgba(255,140,0,0.2)'; ctx.beginPath(); ctx.arc(sunX, sunY+30, sunR+35, 0, Math.PI*2); ctx.fill();
      hillCol1='#8B4513'; hillCol2='#CD853F';
      break;
    case 'rain':
      skyGrad = ctx.createLinearGradient(0,0,0,GY);
      skyGrad.addColorStop(0,'#2c3e50'); skyGrad.addColorStop(1,'#34495e');
      ctx.fillStyle=skyGrad; ctx.fillRect(0,-3000,W,GY+3000);
      // rain drops
      ctx.strokeStyle='rgba(200,220,255,0.6)'; ctx.lineWidth=1;
      for(let i=0;i<80;i++) {
        const rx = (Math.random()*W+cam.x*0.5)%W;
        const ry = (Math.sin(T*0.05+i*0.3)*100 + i*10)%GY;
        ctx.beginPath(); ctx.moveTo(rx, ry); ctx.lineTo(rx-2, ry+8); ctx.stroke();
      }
      hillCol1='#1a1a2e'; hillCol2='#16213e';
      break;
    case 'snow':
      skyGrad = ctx.createLinearGradient(0,0,0,GY);
      skyGrad.addColorStop(0,'#e3f2fd'); skyGrad.addColorStop(1,'#b3e5fc');
      ctx.fillStyle=skyGrad; ctx.fillRect(0,-3000,W,GY+3000);
      // snowflakes
      ctx.fillStyle='rgba(255,255,255,0.9)';
      for(let i=0;i<60;i++) {
        const sx = (Math.random()*W+cam.x*0.5)%W;
        const sy = (Math.sin(T*0.02+i*0.5)*120 + i*15)%GY;
        ctx.beginPath(); ctx.arc(sx, sy, 2+Math.sin(T*0.01+i)*1, 0, Math.PI*2); ctx.fill();
      }
      hillCol1='#90CAF9'; hillCol2='#BBDEFB';
      break;
    default: // night
      skyGrad = ctx.createLinearGradient(0,0,0,GY);
      skyGrad.addColorStop(0,'#03000D'); skyGrad.addColorStop(0.6,'#0D0020'); skyGrad.addColorStop(1,'#1A0008');
      ctx.fillStyle=skyGrad; ctx.fillRect(0,-3000,W,GY+3000);

      // stars (parallax 0.05)
      bgStars.forEach(s=>{
        const sx = ((s.wx - cam.x*0.05) % WORLD_W + WORLD_W) % WORLD_W;
        if(sx>W+10) return;
        const twinkle = 0.5+0.5*Math.sin(T*0.04+s.b*12);
        ctx.fillStyle=`rgba(255,255,220,${(0.3+twinkle*0.7).toFixed(2)})`;
        ctx.beginPath(); ctx.arc(sx,s.y,s.r,0,Math.PI*2); ctx.fill();
      });

      // moon (parallax 0.03)
      const moonX = ((W - cam.x*0.03) % (WORLD_W*0.03+W) + W) % (W+400) - 100;
      ctx.fillStyle='rgba(255,240,180,0.10)'; ctx.beginPath(); ctx.arc(moonX,52,45,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='rgba(255,240,180,0.07)'; ctx.beginPath(); ctx.arc(moonX,52,65,0,Math.PI*2); ctx.fill();

      hillCol1='#160030'; hillCol2='#0F0020';
  }

  // far hills (parallax 0.12) — colors change by theme
  drawHills(cam.x*0.12, GY*0.5, GY*0.72, hillCol1, 3, 0);
  drawHills(cam.x*0.18, GY*0.58, GY*0.78, hillCol2, 5, 200);

  // ruins (parallax 0.30)
  drawRuins(cam.x*0.30);

  // bats (parallax 0.55)
  bats.forEach(b=>{
    b.wx -= b.spd; b.wp += 0.14;
    if(b.wx < cam.x*0.55 - 60) b.wx = cam.x*0.55 + W + Math.random()*300;
    const sx = b.wx - cam.x*0.55;
    if(sx<-50||sx>W+50) return;
    const sy=b.y, wf=Math.sin(b.wp)*0.9;
    ctx.fillStyle='rgba(90,0,120,0.85)';
    ctx.beginPath(); ctx.moveTo(sx,sy); ctx.quadraticCurveTo(sx-b.sz*1.6,sy-b.sz*wf,sx-b.sz*2.8,sy+b.sz*0.3); ctx.quadraticCurveTo(sx-b.sz,sy+b.sz*0.5,sx,sy); ctx.fill();
    ctx.beginPath(); ctx.moveTo(sx,sy); ctx.quadraticCurveTo(sx+b.sz*1.6,sy-b.sz*wf,sx+b.sz*2.8,sy+b.sz*0.3); ctx.quadraticCurveTo(sx+b.sz,sy+b.sz*0.5,sx,sy); ctx.fill();
    ctx.fillStyle='rgba(60,0,90,0.9)'; ctx.beginPath(); ctx.ellipse(sx,sy,b.sz*0.35,b.sz*0.25,0,0,Math.PI*2); ctx.fill();
  });

  // ambient dust (parallax 0.70)
  debris.forEach(d=>{
    d.wx += d.vx; d.y += d.vy;
    if(d.y<10||d.y>GY-20) d.vy*=-1;
    if(d.wx < cam.x*0.7-100) d.wx = cam.x*0.7+W+50;
    const sx=d.wx-cam.x*0.7;
    if(sx<-10||sx>W+10) return;
    ctx.fillStyle=`rgba(180,50,220,${d.a})`;
    ctx.beginPath(); ctx.arc(sx,d.y,d.r,0,Math.PI*2); ctx.fill();
  });
}

function drawHills(offset, yS, yE, col, freq, seed) {
  ctx.fillStyle=col; ctx.beginPath(); ctx.moveTo(0,yE);
  for(let i=0;i<=W+40;i+=12) {
    const x=i; const wx2=i+offset;
    const y=yS+Math.sin(wx2*0.006+seed)*38+Math.sin(wx2*0.018+seed)*18+Math.cos(wx2*0.004+seed)*28;
    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  }
  ctx.lineTo(W,yE); ctx.lineTo(0,yE); ctx.closePath(); ctx.fill();
}

function drawRuins(offset) {
  const towers=[{rx:400,h:130},{rx:750,h:100},{rx:1100,h:145},{rx:1500,h:90},{rx:1900,h:160},{rx:2400,h:110},{rx:3000,h:135}];
  towers.forEach(tw=>{
    const sx=((tw.rx-offset)%WORLD_W+WORLD_W)%(W+200)-50;
    if(sx>W+60||sx<-60) return;
    ctx.fillStyle='rgba(15,5,25,0.95)';
    ctx.fillRect(sx,GY-tw.h,32,tw.h);
    for(let b=0;b<3;b++) ctx.fillRect(sx+b*12,GY-tw.h-13,8,13);
    ctx.fillStyle='rgba(255,80,0,0.25)';
    ctx.fillRect(sx+7,GY-tw.h+22,18,20);
    ctx.fillStyle='rgba(255,120,0,0.12)';
    ctx.beginPath(); ctx.arc(sx+16,GY-tw.h+32,16,0,Math.PI*2); ctx.fill();
  });
}

// ─── GROUND (world space) ─────────────────────────────────────────────────
function drawGround() {
  const gr=ctx.createLinearGradient(0,GY,0,H);
  gr.addColorStop(0,'#2E1505'); gr.addColorStop(1,'#0A0100');
  ctx.fillStyle=gr; ctx.fillRect(-cam.x,GY,WORLD_W,H-GY);
  ctx.fillStyle='#C62828'; ctx.fillRect(-cam.x,GY,WORLD_W,3);
  // cracks every 120px
  ctx.strokeStyle='rgba(0,0,0,0.55)'; ctx.lineWidth=1;
  for(let cx2=0;cx2<WORLD_W;cx2+=120){
    ctx.beginPath(); ctx.moveTo(cx2,GY+3); ctx.lineTo(cx2+18,GY+15); ctx.lineTo(cx2+10,GY+26); ctx.stroke();
  }
  // distance markers every 500px
  ctx.fillStyle='rgba(255,100,100,0.25)';
  ctx.font='11px Arial'; ctx.textAlign='center';
  for(let mx=500;mx<WORLD_W;mx+=500){
    ctx.fillRect(mx-1,GY,2,12);
    ctx.fillStyle='rgba(255,100,100,0.5)';
    ctx.fillText(Math.round(mx/METER)+'m', mx, GY+22);
    ctx.fillStyle='rgba(255,100,100,0.25)';
  }
}

// ─── OBSTACLES (world space) ──────────────────────────────────────────────
function drawObstacles() {
  obstacles.forEach(o=>{
    const sx=o.cx - cam.x;
    if(sx < -100 || sx > W-60) return; // nascosti oltre il bordo destro (fog of war)
    ctx.save();
    ctx.translate(sx, 0);
    switch(o.type){
      case 'TNT':    drawTNT(o);    break;
      case 'SPIKE':  drawSpike(o);  break;
      case 'KNIFE':  drawKnife(o);  break;
      case 'CACTUS': drawCactus(o); break;
      case 'ACID':   drawAcid(o);   break;
      case 'SAW':    drawSaw(o);    break;
      case 'BEAR':   drawBear(o);   break;
      case 'SPRING':   drawSpring(o);   break;
      case 'MUSHROOM': drawMushroom(o); break;
      case 'CLOUD':    drawCloud(o);    break;
      case 'BALLOON':   drawBalloon(o);   break;
      case 'BIRD':      drawBird(o);      break;
      case 'PLANE':     drawPlane(o);     break;
      case 'CHAINSAW':  drawChainsaw(o);  break;
      case 'LIGHTNING': drawLightning(o); break;
    }
    ctx.restore();
  });
}

// All obstacle draw functions use cx=0 (already translated)
function drawTNT(o) {
  const p=0.85+0.15*Math.sin(T*0.12);
  ctx.shadowColor='#FF4400'; ctx.shadowBlur=12*p;
  ctx.fillStyle=`rgb(${Math.floor(160+50*p)},18,18)`;
  ctx.beginPath(); ctx.roundRect(-22,o.cy-50,44,50,5); ctx.fill();
  ctx.strokeStyle='#FF5252'; ctx.lineWidth=2; ctx.stroke(); ctx.shadowBlur=0;
  for(let i=0;i<3;i++){ctx.fillStyle='rgba(0,0,0,0.3)'; ctx.fillRect(-22,o.cy-44+i*14,44,7);}
  ctx.fillStyle='#FFEB3B'; ctx.font='bold 14px Arial Black'; ctx.textAlign='center';
  ctx.fillText('TNT',0,o.cy-17);
  ctx.strokeStyle='#795548'; ctx.lineWidth=2; ctx.beginPath();
  ctx.moveTo(0,o.cy-50); ctx.quadraticCurveTo(18,o.cy-68,12,o.cy-80); ctx.stroke();
  if(Math.sin(T*0.22)>0){
    ctx.shadowColor='#FFF176'; ctx.shadowBlur=14; ctx.fillStyle='#FFF176';
    ctx.beginPath(); ctx.arc(12,o.cy-80,3,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
  }
}

function drawSpike(o) {
  const n=6, sw=o.r*2/n;
  for(let i=0;i<n;i++){
    const sx=-o.r+i*sw+sw/2;
    ctx.fillStyle=i%2===0?'#9E9E9E':'#757575';
    ctx.beginPath(); ctx.moveTo(sx-sw*0.38,GY); ctx.lineTo(sx,GY-74); ctx.lineTo(sx+sw*0.38,GY); ctx.closePath(); ctx.fill();
    ctx.strokeStyle='#424242'; ctx.lineWidth=1; ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,0.35)'; ctx.beginPath(); ctx.moveTo(sx,GY-74); ctx.lineTo(sx+2,GY-55); ctx.lineTo(sx,GY-68); ctx.fill();
  }
  const bp=0.6+0.4*Math.sin(T*0.08);
  ctx.fillStyle=`rgba(100,0,0,${bp*0.65})`; ctx.beginPath(); ctx.ellipse(0,GY,o.r*bp,5,0,0,Math.PI*2); ctx.fill();
}

function drawKnife(o) {
  const sway=Math.sin(T*0.04+o.cx*0.01)*2.5;
  ctx.translate(0,o.cy+5); ctx.rotate(sway*Math.PI/180);
  ctx.fillStyle='#E8E8E8'; ctx.beginPath(); ctx.moveTo(0,-60); ctx.lineTo(14,3); ctx.lineTo(-14,3); ctx.closePath(); ctx.fill();
  ctx.strokeStyle='#9E9E9E'; ctx.lineWidth=1; ctx.stroke();
  ctx.strokeStyle='rgba(255,255,255,0.7)'; ctx.lineWidth=1.5; ctx.beginPath(); ctx.moveTo(-2,-53); ctx.lineTo(9,-10); ctx.stroke();
  ctx.fillStyle='rgba(139,0,0,0.75)'; ctx.beginPath(); ctx.moveTo(0,-32); ctx.lineTo(9,3); ctx.lineTo(-9,3); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#B8860B'; ctx.fillRect(-17,-3,34,8);
  ctx.fillStyle='#4E342E'; ctx.beginPath(); ctx.roundRect(-11,5,22,28,3); ctx.fill();
  [9,14,19,24,28].forEach(y=>{ctx.strokeStyle='#6D4C41';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(-11,y);ctx.lineTo(11,y);ctx.stroke();});
}

function drawCactus(o) {
  const sw=Math.sin(T*0.03+o.cx*0.005)*2;
  ctx.translate(0,0); ctx.rotate(sw*Math.PI/180);
  ctx.fillStyle='#2E7D32';
  ctx.beginPath(); ctx.roundRect(-10,o.cy-90,20,90,5); ctx.fill();
  ctx.beginPath(); ctx.roundRect(-40,o.cy-66,32,10,5); ctx.fill();
  ctx.beginPath(); ctx.roundRect(-40,o.cy-90,10,30,5); ctx.fill();
  ctx.beginPath(); ctx.roundRect(8,o.cy-56,32,10,5); ctx.fill();
  ctx.beginPath(); ctx.roundRect(30,o.cy-78,10,28,5); ctx.fill();
  ctx.fillStyle='#1B5E20'; ctx.beginPath(); ctx.roundRect(-10,o.cy-90,20,90,5); ctx.fill();
  ctx.strokeStyle='#A5D6A7'; ctx.lineWidth=1.5;
  [[0,-72],[0,-44],[0,-18],[-26,-64],[-26,-44],[34,-59],[34,-42]].forEach(([sx,sy])=>{
    ctx.beginPath();ctx.moveTo(sx-5,o.cy+sy);ctx.lineTo(sx-13,o.cy+sy-6);ctx.stroke();
    ctx.beginPath();ctx.moveTo(sx+5,o.cy+sy);ctx.lineTo(sx+13,o.cy+sy-6);ctx.stroke();
  });
}

function drawAcid(o) {
  ctx.shadowColor='#76FF03'; ctx.shadowBlur=18+8*Math.sin(T*0.07);
  ctx.fillStyle='#33691E'; ctx.beginPath(); ctx.ellipse(0,o.cy,o.r,16,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#76FF03'; ctx.beginPath(); ctx.moveTo(-o.r,o.cy-6);
  for(let i=0;i<=o.r*2;i+=8){ctx.lineTo(-o.r+i,o.cy-9+Math.sin((i+T*3)*0.2)*4);}
  ctx.lineTo(o.r,o.cy+10); ctx.lineTo(-o.r,o.cy+10); ctx.closePath(); ctx.fill();
  ctx.shadowBlur=0;
  for(let i=0;i<5;i++){
    const bx=-o.r+12+i*(o.r*2/5), by=o.cy-8+Math.sin(T*0.05*2+i*1.3)*5;
    ctx.fillStyle='rgba(178,255,89,0.7)'; ctx.beginPath(); ctx.arc(bx,by,2.5+Math.sin(T*0.06+i)*1.5,0,Math.PI*2); ctx.fill();
  }
  ctx.font='16px serif'; ctx.textAlign='center'; ctx.fillStyle='rgba(200,255,100,0.8)';
  ctx.fillText('☠',0,o.cy+7);
}

function drawLightning(o) {
  const flash = Math.sin(T*0.3+o.cx*0.01)*0.5 + 0.5;
  ctx.shadowColor='#FFFF00'; ctx.shadowBlur=20+flash*10;
  ctx.strokeStyle='#FFFF00'; ctx.lineWidth=3;
  ctx.beginPath();
  let x=0, y=o.cy-o.r;
  ctx.moveTo(x, y);
  for(let i=0;i<5;i++) {
    x += (Math.random()-0.5)*20;
    y += 10 + Math.random()*6;
    ctx.lineTo(x, y);
  }
  ctx.stroke();
  if(flash>0.7) {
    ctx.globalAlpha = (flash-0.7)*3;
    ctx.fillStyle='rgba(255,255,150,0.8)';
    ctx.fillRect(-o.r, o.cy-o.r-2, o.r*2, 4);
    ctx.globalAlpha=1;
  }
  ctx.shadowBlur=0;
}

function drawSaw(o) {
  // support if floating
  if(o.cy < GY-60){
    const swg=Math.sin(T*0.022+o.cx*0.01)*9;
    ctx.save(); ctx.translate(0,0); ctx.rotate(swg*Math.PI/180);
    ctx.strokeStyle='#333'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(0,o.cy-o.r); ctx.lineTo(0,0); ctx.stroke();
    for(let y=0;y<o.cy-o.r;y+=14){
      ctx.strokeStyle='#444'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.ellipse(0,y+7,4,5,y%28===0?0:Math.PI/2,0,Math.PI*2); ctx.stroke();
    }
  }
  ctx.save(); ctx.translate(0,o.cy); ctx.rotate(sawRot);
  ctx.shadowColor='rgba(255,50,50,0.35)'; ctx.shadowBlur=8;
  const teeth=16; ctx.fillStyle='#9E9E9E'; ctx.beginPath();
  for(let i=0;i<teeth;i++){
    const a1=(i/teeth)*Math.PI*2,a2=((i+0.5)/teeth)*Math.PI*2,a3=((i+1)/teeth)*Math.PI*2;
    ctx.lineTo(Math.cos(a1)*o.r,Math.sin(a1)*o.r);
    ctx.lineTo(Math.cos(a2)*(o.r+11),Math.sin(a2)*(o.r+11));
    ctx.lineTo(Math.cos(a3)*o.r,Math.sin(a3)*o.r);
  }
  ctx.closePath(); ctx.fill(); ctx.strokeStyle='#555'; ctx.lineWidth=1; ctx.stroke(); ctx.shadowBlur=0;
  ctx.fillStyle='#757575'; ctx.beginPath(); ctx.arc(0,0,o.r*0.55,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='rgba(180,0,0,0.5)'; ctx.lineWidth=2;
  for(let i=0;i<5;i++){const a=(i/5)*Math.PI*2; ctx.beginPath(); ctx.moveTo(Math.cos(a)*4,Math.sin(a)*4); ctx.lineTo(Math.cos(a)*o.r*0.5,Math.sin(a)*o.r*0.5); ctx.stroke();}
  ctx.fillStyle='#222'; ctx.beginPath(); ctx.arc(0,0,5,0,Math.PI*2); ctx.fill();
  ctx.restore();
  if(o.cy < GY-60) ctx.restore();
}

function drawBear(o) {
  ctx.translate(0,o.cy);
  ctx.fillStyle='#616161'; ctx.beginPath(); ctx.ellipse(0,0,o.r,9,0,0,Math.PI*2); ctx.fill();
  function jaw(dir) {
    ctx.save(); ctx.rotate(dir*-0.5);
    ctx.fillStyle='#424242'; ctx.beginPath(); ctx.moveTo(-5,-2); ctx.lineTo(-o.r,6); ctx.lineTo(-o.r,-6); ctx.lineTo(-5,2); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#E0E0E0';
    for(let i=0;i<4;i++){ctx.beginPath();ctx.moveTo(-10-i*6,-1);ctx.lineTo(-8-i*6,-9);ctx.lineTo(-6-i*6,-1);ctx.fill();}
    ctx.restore();
  }
  jaw(1); ctx.save(); ctx.scale(-1,1); jaw(-1); ctx.restore();
  ctx.fillStyle='#8B0000'; [-8,-2,4,10].forEach(bx=>{ctx.beginPath();ctx.arc(bx,3,2,0,Math.PI*2);ctx.fill();});
  ctx.strokeStyle='#9E9E9E'; ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(-5,7);ctx.lineTo(-5,18);ctx.stroke();
  ctx.beginPath();ctx.moveTo(5,7);ctx.lineTo(5,18);ctx.stroke();
}

function drawSpring(o) {
  const sq=1+0.07*Math.sin(T*0.08+o.cx*0.01);
  ctx.fillStyle='#00B0FF'; ctx.fillRect(-15,o.cy,30,5); ctx.fillRect(-15,o.cy-52*sq,30,5);
  ctx.strokeStyle='#00B0FF'; ctx.lineWidth=3.5; ctx.lineCap='round';
  const coils=5,ch=(50*sq)/coils;
  for(let i=0;i<coils;i++){
    const y1=o.cy-i*ch,y2=o.cy-(i+1)*ch;
    ctx.beginPath();ctx.moveTo(-12,y1);ctx.bezierCurveTo(18,y1-ch*0.3,18,y2+ch*0.3,12,y2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(12,y2);ctx.bezierCurveTo(-18,y2-ch*0.3,-18,y2-ch*0.7,-12,y2-ch);ctx.stroke();
  }
}

function drawMushroom(o) {
  const bob=Math.sin(T*0.06+o.cx*0.01)*3;
  ctx.fillStyle='#FFFDE7'; ctx.beginPath(); ctx.roundRect(-10,o.cy-28+bob,20,28,4); ctx.fill();
  ctx.fillStyle='#E53935'; ctx.beginPath(); ctx.arc(0,o.cy-28+bob,o.r,Math.PI,0,false); ctx.fill();
  ctx.fillStyle='white'; [[0,-14],[12,-8],[-12,-8],[0,-22]].forEach(([dx,dy])=>{ctx.beginPath();ctx.arc(dx,o.cy-28+bob+dy,5,0,Math.PI*2);ctx.fill();});
}

function drawCloud(o) {
  o._drift = Math.sin(T*0.018+o.cx*0.008)*8;
  const dx=o._drift;
  ctx.fillStyle='rgba(170,140,200,0.75)';
  ctx.beginPath();
  ctx.arc(dx,o.cy,o.r*0.55,0,Math.PI*2);
  ctx.arc(dx+o.r*0.45,o.cy+7,o.r*0.38,0,Math.PI*2);
  ctx.arc(dx-o.r*0.4,o.cy+7,o.r*0.35,0,Math.PI*2);
  ctx.fill();
  ctx.strokeStyle='rgba(130,80,180,0.5)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(dx,o.cy,o.r*0.55,0,Math.PI*2); ctx.stroke();
}

function drawBalloon(o){
  const bob=Math.sin(T*0.012+o.cx*0.004)*8;
  const cy=o.cy+bob;
  const PALS=[['#FF5252','#B71C1C'],['#FFAB40','#E65100'],['#FFEB3B','#F9A825'],
              ['#69F0AE','#1B5E20'],['#40C4FF','#01579B'],['#E040FB','#4A148C']];
  const [c1,c2]=PALS[Math.floor(o.cx/300)%PALS.length];
  // envelope
  ctx.fillStyle=c1; ctx.beginPath(); ctx.arc(0,cy,o.r,0,Math.PI*2); ctx.fill();
  // stripes
  for(let i=0;i<6;i+=2){
    ctx.fillStyle=c2; ctx.beginPath(); ctx.moveTo(0,cy);
    ctx.arc(0,cy,o.r,(i/6)*Math.PI*2,((i+1)/6)*Math.PI*2); ctx.closePath(); ctx.fill();
  }
  // highlight
  ctx.fillStyle='rgba(255,255,255,0.22)';
  ctx.beginPath(); ctx.arc(-o.r*.28,cy-o.r*.3,o.r*.38,0,Math.PI*2); ctx.fill();
  // ropes
  ctx.strokeStyle='#A0926A'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(-o.r*.45,cy+o.r); ctx.lineTo(-12,cy+o.r+20); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(o.r*.45,cy+o.r);  ctx.lineTo(12,cy+o.r+20);  ctx.stroke();
  // basket
  ctx.fillStyle='#5D4037';
  ctx.beginPath(); ctx.roundRect(-14,cy+o.r+20,28,16,2); ctx.fill();
  ctx.strokeStyle='#3E2723'; ctx.lineWidth=1.5; ctx.strokeRect(-14,cy+o.r+20,28,16);
  ctx.strokeStyle='#4E342E'; ctx.lineWidth=1;
  [6,12].forEach(y=>{ctx.beginPath();ctx.moveTo(-14,cy+o.r+20+y);ctx.lineTo(14,cy+o.r+20+y);ctx.stroke();});
  [-5,0,5].forEach(x=>{ctx.beginPath();ctx.moveTo(x,cy+o.r+20);ctx.lineTo(x,cy+o.r+36);ctx.stroke();});
  // flame glow
  const fl=0.6+0.4*Math.sin(T*0.14);
  ctx.shadowColor='#FFAB40'; ctx.shadowBlur=10*fl;
  ctx.fillStyle=`rgba(255,${Math.floor(80+60*fl)},0,0.9)`;
  ctx.beginPath(); ctx.arc(0,cy+o.r+20,4,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0;
}

function drawBird(o){
  const flap=Math.sin(T*0.22+o.cx*0.01)*0.85;
  ctx.save(); ctx.translate(0,o.cy);
  ctx.scale(-1,1); // vola verso sinistra
  // ombre ali
  ctx.fillStyle='#37474F';
  ctx.save(); ctx.rotate(-flap-.15);
  ctx.beginPath(); ctx.ellipse(-o.r*.75,-o.r*.05,o.r*.75,o.r*.22,-.25,0,Math.PI*2); ctx.fill();
  ctx.restore();
  ctx.save(); ctx.rotate(flap+.15);
  ctx.beginPath(); ctx.ellipse(o.r*.75,-o.r*.05,o.r*.75,o.r*.22,.25,0,Math.PI*2); ctx.fill();
  ctx.restore();
  // corpo
  ctx.fillStyle='#455A64';
  ctx.beginPath(); ctx.ellipse(0,0,o.r*.7,o.r*.4,0,0,Math.PI*2); ctx.fill();
  // testa
  ctx.fillStyle='#37474F'; ctx.beginPath(); ctx.arc(o.r*.72,-o.r*.1,o.r*.36,0,Math.PI*2); ctx.fill();
  // becco (aggressivo)
  ctx.fillStyle='#FF8F00';
  ctx.beginPath(); ctx.moveTo(o.r*1.02,-o.r*.1); ctx.lineTo(o.r*1.5,.04); ctx.lineTo(o.r*1.02,o.r*.18); ctx.fill();
  // occhio rosso minaccioso
  ctx.fillStyle='#FF1744'; ctx.beginPath(); ctx.arc(o.r*.85,-o.r*.18,o.r*.14,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#111'; ctx.beginPath(); ctx.arc(o.r*.87,-o.r*.18,o.r*.07,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawPlane(o){
  const cy=o.cy;
  ctx.save(); ctx.scale(-1,1); // vola verso sinistra
  // fusoliera
  ctx.fillStyle='#90A4AE';
  ctx.beginPath(); ctx.ellipse(0,cy,28,10,0,0,Math.PI*2); ctx.fill();
  // ala principale
  ctx.fillStyle='#78909C';

function drawChainsaw(o){
  const swingA=Math.sin(T*0.025+o.cx*0.008)*0.55;
  const chainLen=o._chainLen||160;
  const cloudCY=o.cy;
  // nuvola di supporto
  ctx.fillStyle='rgba(160,130,195,0.85)';
  ctx.beginPath();
  ctx.arc(0,cloudCY,30,0,Math.PI*2);
  ctx.arc(26,cloudCY+10,22,0,Math.PI*2);
  ctx.arc(-22,cloudCY+10,20,0,Math.PI*2);
  ctx.fill();
  ctx.strokeStyle='rgba(110,70,165,0.5)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(0,cloudCY,30,0,Math.PI*2); ctx.stroke();
  // catena (maglie ovoidali alternate)
  const attachY=cloudCY+28;
  const sawX=Math.sin(swingA)*chainLen;
  const sawY=attachY+Math.cos(swingA)*chainLen;
  const steps=Math.floor(chainLen/11);
  ctx.strokeStyle='#444'; ctx.lineWidth=2;
  for(let i=0;i<steps;i++){
    const t1=i/steps, t2=(i+1)/steps;
    const lx=(Math.sin(swingA)*chainLen*(t1+t2)*.5);
    const ly=attachY+Math.cos(swingA)*chainLen*(t1+t2)*.5;
    ctx.beginPath();
    if(i%2===0){ ctx.ellipse(lx,ly,4,2.5,swingA,0,Math.PI*2); }
    else        { ctx.ellipse(lx,ly,2.5,4,swingA+Math.PI/2,0,Math.PI*2); }
    ctx.stroke();
  }
  // sega a pendolo
  ctx.save(); ctx.translate(sawX,sawY); ctx.rotate(sawRot);
  const sawR=o.r;
  ctx.shadowColor='rgba(255,50,50,0.4)'; ctx.shadowBlur=10;
  ctx.fillStyle='#9E9E9E'; ctx.beginPath();
  for(let i=0;i<16;i++){
    const a1=(i/16)*Math.PI*2,a2=((i+.5)/16)*Math.PI*2,a3=((i+1)/16)*Math.PI*2;
    ctx.lineTo(Math.cos(a1)*sawR,Math.sin(a1)*sawR);
    ctx.lineTo(Math.cos(a2)*(sawR+10),Math.sin(a2)*(sawR+10));
    ctx.lineTo(Math.cos(a3)*sawR,Math.sin(a3)*sawR);
  }
  ctx.closePath(); ctx.fill(); ctx.strokeStyle='#555'; ctx.lineWidth=1; ctx.stroke();
  ctx.shadowBlur=0;
  ctx.fillStyle='#757575'; ctx.beginPath(); ctx.arc(0,0,sawR*.55,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='rgba(180,0,0,0.5)'; ctx.lineWidth=2;
  for(let i=0;i<5;i++){const a=(i/5)*Math.PI*2; ctx.beginPath(); ctx.moveTo(Math.cos(a)*4,Math.sin(a)*4); ctx.lineTo(Math.cos(a)*sawR*0.5,Math.sin(a)*sawR*0.5); ctx.stroke();}
  ctx.fillStyle='#222'; ctx.beginPath(); ctx.arc(0,0,5,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

// ─── MOUSE (world space) ──────────────────────────────────────────────────
function drawMouse(m) {
  if(!m||!m.alive) return;
  const sx = m.wx - cam.x; // screen x
  const spd = Math.hypot(m.vx,m.vy);
  ctx.save();
  const va = Math.atan2(m.vy,m.vx);

  // shadow
  if(m.wy < GY-15){
    const sd=(m.wy-GY)/GY, so=Math.max(0.04,Math.min(0.28,0.28+sd*0.5)), sr=Math.max(6,28+sd*50);
    ctx.fillStyle=`rgba(0,0,0,${so})`; ctx.beginPath(); ctx.ellipse(sx,GY+2,sr,6,0,0,Math.PI*2); ctx.fill();
  }

  // speed lines
  if(spd>7){
    ctx.save(); ctx.translate(sx,m.wy); ctx.rotate(va);
    ctx.strokeStyle='rgba(255,180,180,0.35)'; ctx.lineWidth=1.5;
    for(let i=0;i<Math.floor(spd/3);i++){
      const ly=(Math.random()-0.5)*30, ll=18+Math.random()*32;
      ctx.beginPath(); ctx.moveTo(-16,ly); ctx.lineTo(-16-ll,ly); ctx.stroke();
    }
    ctx.restore();
  }

  ctx.save();
  ctx.translate(sx,m.wy);
  ctx.rotate(va+0.1);

  // trail
  m.trail.forEach((pt,i)=>{
    ctx.globalAlpha=(i/m.trail.length)*0.4;
    ctx.fillStyle='rgba(255,80,80,1)';
    ctx.beginPath(); ctx.arc(pt.wx-m.wx,pt.wy-m.wy,7*(i/m.trail.length),0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1;

  // LEGS flailing
  const lsw = m.settled ? 0 : T*0.22;
  ctx.strokeStyle='#757575'; ctx.lineWidth=3; ctx.lineCap='round';
  // front pair
  [[10,-2, 1],[10,5,-1]].forEach(([bx,by,dir],idx)=>{
    ctx.save(); ctx.translate(bx,by); ctx.rotate(Math.sin(lsw+idx)*0.9*dir-0.3*dir);
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(15*dir,2); ctx.stroke();
    ctx.fillStyle='#EF9A9A'; ctx.beginPath(); ctx.arc(15*dir,2,4,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });
  // back pair
  [[-10,-2,-1],[-10,5,1]].forEach(([bx,by,dir],idx)=>{
    ctx.save(); ctx.translate(bx,by); ctx.rotate(Math.sin(lsw+2+idx)*0.9*dir+0.4*dir);
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-14*dir,-2); ctx.stroke();
    ctx.fillStyle='#EF9A9A'; ctx.beginPath(); ctx.arc(-14*dir,-2,4,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });

  // body
  ctx.fillStyle='#9E9E9E'; ctx.beginPath(); ctx.ellipse(0,0,19,13,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#BDBDBD'; ctx.beginPath(); ctx.ellipse(2,2,12,8,0,0,Math.PI*2); ctx.fill();

  // head
  ctx.fillStyle='#BDBDBD'; ctx.beginPath(); ctx.arc(18,-1,13,0,Math.PI*2); ctx.fill();

  // ears (blown back at speed)
  const eb=Math.min(0.65,spd*0.04);
  ctx.fillStyle='#EF9A9A';
  ctx.save(); ctx.translate(14,-14); ctx.rotate(eb);
  ctx.beginPath(); ctx.arc(0,0,8,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#BDBDBD'; ctx.beginPath(); ctx.arc(0,0,5,0,Math.PI*2); ctx.fill();
  ctx.restore();
  ctx.fillStyle='#EF9A9A';
  ctx.save(); ctx.translate(22,-13); ctx.rotate(eb*0.7);
  ctx.beginPath(); ctx.arc(0,0,7,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#BDBDBD'; ctx.beginPath(); ctx.arc(0,0,4,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // eye
  ctx.fillStyle='#111'; ctx.beginPath(); ctx.arc(24,-5,3.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='white'; ctx.beginPath(); ctx.arc(25,-6.5,1.4,0,Math.PI*2); ctx.fill();

  // sweat
  if(spd>9){ ctx.fillStyle='rgba(100,180,255,0.85)'; ctx.beginPath(); ctx.arc(28,-12,3,0,Math.PI*2); ctx.fill(); }

  // nose
  ctx.fillStyle='#E91E63'; ctx.beginPath(); ctx.arc(31,-0.5,3,0,Math.PI*2); ctx.fill();

  // mouth — screaming if flying fast
  if(spd>4&&!m.settled){
    ctx.fillStyle='#111'; ctx.beginPath(); ctx.arc(31,5,4.5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#FF1744'; ctx.beginPath(); ctx.arc(31,5,2.5,0,Math.PI*2); ctx.fill();
    if(Math.sin(T*0.28)>0){
      ctx.save(); ctx.rotate(-va-0.1);
      ctx.fillStyle='rgba(255,255,255,0.75)'; ctx.font='bold 8px Arial'; ctx.textAlign='center';
      ctx.fillText('AAAA!',5,-26); ctx.restore();
    }
  } else {
    ctx.strokeStyle='#555'; ctx.lineWidth=1.5; ctx.beginPath(); ctx.arc(31,6,3,0.2,Math.PI-0.2); ctx.stroke();
  }

  // whiskers
  ctx.strokeStyle='rgba(255,255,255,0.45)'; ctx.lineWidth=0.8;
  [[-2,-5],[0,-1],[2,3]].forEach(([wy2,wz])=>{
    ctx.beginPath(); ctx.moveTo(27+wy2,wz); ctx.lineTo(40+wy2,wz); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(27+wy2,wz); ctx.lineTo(14+wy2,wz); ctx.stroke();
  });

  // tail
  ctx.strokeStyle='#9E9E9E'; ctx.lineWidth=2.5; ctx.lineCap='round';
  const tw = m.settled ? 0 : Math.sin(T*0.18)*18;
  ctx.beginPath(); ctx.moveTo(-17,3); ctx.quadraticCurveTo(-30,-9+tw,-40,2+tw*0.5); ctx.stroke();

  ctx.restore();

  if(m.inAcid > 0){
    const prog = 1 - m.inAcid/120;
    ctx.save();
    ctx.shadowColor='#76FF03'; ctx.shadowBlur=22+prog*12;
    ctx.globalAlpha = 0.25 + prog*0.55;
    ctx.fillStyle=`rgba(40,${Math.floor(200+55*prog)},0,0.7)`;
    ctx.beginPath(); ctx.ellipse(sx,m.wy, 22+prog*20, 15+prog*14, 0, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
    for(let i=0;i<6;i++){
      const bph=((T*2+i*20)%120)/120;
      ctx.fillStyle=`rgba(150,255,50,${0.75*(1-bph)})`;
      ctx.beginPath(); ctx.arc(sx+(i-2.5)*13, m.wy - bph*60, 2+bph*5, 0, Math.PI*2); ctx.fill();
    }
    if(prog>0.6){
      ctx.globalAlpha=(prog-0.6)/0.4;
      ctx.font='bold 14px Arial Black'; ctx.textAlign='center';
      ctx.fillStyle='#CCFF00'; ctx.shadowColor='#003300'; ctx.shadowBlur=6;
      ctx.fillText('☠ STA FONDENDO...', sx, m.wy-45);
      ctx.shadowBlur=0;
    }
    ctx.globalAlpha=1;
    ctx.restore();
  }

  ctx.restore();
}

  ctx.save(); ctx.translate(24,-15); ctx.rotate(eb*0.7);
  ctx.beginPath(); ctx.arc(0,0,6.5,0,Math.PI*2); ctx.fill();
  ctx.restore();

  ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(23,-6,3.5,0,Math.PI*2); ctx.fill();

  if(spd>9){ ctx.fillStyle='rgba(100,180,255,0.85)'; ctx.beginPath(); ctx.arc(28,-12,3,0,Math.PI*2); ctx.fill(); }

  ctx.fillStyle='#D4A574'; ctx.beginPath(); ctx.arc(32,1,2.5,0,Math.PI*2); ctx.fill();

  if(spd>4&&!m.settled){
    ctx.fillStyle='#1a1a1a'; ctx.beginPath(); ctx.arc(31,7,3.5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#FFD700'; ctx.beginPath(); ctx.arc(31,7,2,0,Math.PI*2); ctx.fill();
  } else {
    ctx.strokeStyle='#5a5a5a'; ctx.lineWidth=1.5; ctx.beginPath(); ctx.arc(31,7,2.5,0.2,Math.PI-0.2); ctx.stroke();
  }

    ctx.beginPath(); ctx.moveTo(27+wy2,wz); ctx.lineTo(14+wy2,wz); ctx.stroke();
  });

  ctx.strokeStyle='#8B6F47'; ctx.lineWidth=2.5; ctx.lineCap='round';
  const tw = m.settled ? 0 : Math.sin(T*0.15)*22;
  ctx.beginPath(); ctx.moveTo(-15,5); ctx.quadraticCurveTo(-28,-5+tw,-42,5+tw*0.5); ctx.stroke();

  ctx.restore();

  if(m.inAcid > 0){
    const prog = 1 - m.inAcid/120;
    ctx.save();
    ctx.shadowColor='#76FF03'; ctx.shadowBlur=22+prog*12;
    ctx.globalAlpha = 0.25 + prog*0.55;
    ctx.fillStyle=`rgba(40,${Math.floor(200+55*prog)},0,0.7)`;
    ctx.beginPath(); ctx.ellipse(sx,m.wy, 22+prog*20, 15+prog*14, 0, 0, Math.PI*2); ctx.fill();

      ctx.beginPath(); ctx.arc(sx+(i-2.5)*13, m.wy - bph*60, 2+bph*5, 0, Math.PI*2); ctx.fill();

    }
    ctx.globalAlpha=1;
    ctx.restore();
  }

  ctx.restore();
}

// ── PAVEL (👤) ───────────────────────────────────────────────────────────
function drawPavel(m) {
  if(!m||!m.alive) return;
  const sx = m.wx - cam.x;
  const spd = Math.hypot(m.vx,m.vy);
  ctx.save();
  const va = Math.atan2(m.vy,m.vx);

  if(m.wy < GY-15){
    const sd=(m.wy-GY)/GY, so=Math.max(0.04,Math.min(0.28,0.28+sd*0.5)), sr=Math.max(6,28+sd*50);
    ctx.fillStyle=`rgba(0,0,0,${so})`; ctx.beginPath(); ctx.ellipse(sx,GY+2,sr,6,0,0,Math.PI*2); ctx.fill();
  }

  if(spd>7){
    ctx.save(); ctx.translate(sx,m.wy); ctx.rotate(va);
    ctx.strokeStyle='rgba(255,180,180,0.35)'; ctx.lineWidth=1.5;
    for(let i=0;i<Math.floor(spd/3);i++){
      const ly=(Math.random()-0.5)*30, ll=18+Math.random()*32;
      ctx.beginPath(); ctx.moveTo(-16,ly); ctx.lineTo(-16-ll,ly); ctx.stroke();
    }
    ctx.restore();
  }

  ctx.save();
  ctx.translate(sx,m.wy);

    ctx.fillStyle='rgba(255,80,80,1)';

  ctx.fillStyle='#333'; ctx.beginPath(); ctx.arc(22,-6,3.5,0,Math.PI*2); ctx.fill();

  ctx.fillStyle='#8B7355'; ctx.beginPath(); ctx.arc(32,1,2,0,Math.PI*2); ctx.fill();

  if(spd>4&&!m.settled){

  });

  const tw = m.settled ? 0 : Math.sin(T*0.18)*16;
  ctx.beginPath(); ctx.moveTo(-15,3); ctx.quadraticCurveTo(-25,-8+tw,-36,3+tw*0.4); ctx.stroke();

  ctx.restore();

  if(m.inAcid > 0){

    ctx.shadowColor='#76FF03'; ctx.shadowBlur=22+prog*12;
    ctx.globalAlpha = 0.25 + prog*0.55;
    ctx.fillStyle=`rgba(40,${Math.floor(200+55*prog)},0,0.7)`;
    ctx.beginPath(); ctx.ellipse(sx,m.wy, 22+prog*20, 15+prog*14, 0, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
    for(let i=0;i<6;i++){

function drawCannon() {

  ctx.fillStyle='#4E342E'; ctx.beginPath(); ctx.arc(sx-4,CANNON_WX_Y+19,23,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#6D4C41'; ctx.beginPath(); ctx.arc(sx-4,CANNON_WX_Y+19,16,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#3E2723'; ctx.lineWidth=2;
  for(let i=0;i<6;i++){const a=(i/6)*Math.PI*2;ctx.beginPath();ctx.moveTo(sx-4+Math.cos(a)*5,CANNON_WX_Y+19+Math.sin(a)*5);ctx.lineTo(sx-4+Math.cos(a)*16,CANNON_WX_Y+19+Math.sin(a)*16);ctx.stroke();}
  ctx.fillStyle='#37474F'; ctx.beginPath(); ctx.ellipse(sx,CANNON_WX_Y+9,28,14,0,0,Math.PI*2); ctx.fill();
  ctx.save(); ctx.translate(sx,CANNON_WX_Y); ctx.rotate(rad);
  const g=ctx.createLinearGradient(0,-13,0,13);
  g.addColorStop(0,'#607D8B'); g.addColorStop(0.5,'#263238'); g.addColorStop(1,'#37474F');
  ctx.fillStyle=g; ctx.beginPath(); ctx.roundRect(0,-13,64,26,7); ctx.fill();
  if(muzzleFlash>0){
    ctx.globalAlpha=muzzleFlash/6;
    ctx.fillStyle='#FFEB3B'; ctx.beginPath(); ctx.arc(64,0,18,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1; muzzleFlash--;

}

function getDeathLabel(type) {
  return t(`death_${type.toLowerCase()}`) || `${type}!`;
}

function killMouse(m, type) {
  if(!m.alive) return;
  m.alive=false;
  sfxScream();
  const dist=Math.round(m.wx/METER);
  lastDist=dist;
  if(dist>bestDist) bestDist=dist;
  const d=DEATHS[type]||DEATHS.STOP;
  const bonusDist=Math.floor(dist*0.4);
  kills++; score+=d.pts+bonusDist;
  camShake.power = type==='TNT'||type==='PLANE'?32 : type==='SAW'||type==='CHAINSAW'?18 : type==='GROUND'?8 : 10;
  // avvia animazione 3 secondi (180 frame @ 60fps)
  if(type !== 'STOP'){
    animState = { phase:'death', deathType:type, wx:m.wx, wy:m.wy,
                  mvx:m.vx, mvy:m.vy, t:0, dur:180 };
  }
  const sx=m.wx-cam.x;
  texts.push({wx:m.wx,wy:m.wy-45,text:getDeathLabel(type),color:d.color,life:1.8,vy:-1.8,size:24});
  texts.push({wx:m.wx,wy:m.wy-78,text:`${dist}m • +${d.pts+bonusDist}`,color:'#FFEB3B',life:1.5,vy:-1.3,size:17});

  switch(type){
    case 'TNT':
      sfxTNT();
      burst(m.wx,m.wy,'#FF6600',55,14);burst(m.wx,m.wy,'#FFEB3B',35,10);burst(m.wx,m.wy,'#FF0000',25,7);burst(m.wx,m.wy,'#FFFFFF',12,16);
      chunks(m.wx,m.wy,'#9E9E9E',20);chunks(m.wx,m.wy,'#CC0000',18);
      ring(m.wx,m.wy,'#FF8800',14,6);ring(m.wx,m.wy,'#FFEB3B',8,9);ring(m.wx,m.wy,'#FF4400',4,12); break;
    case 'SPIKE':
      sfxSpike();
      for(let i=0;i<50;i++){const a=-Math.PI/2+(Math.random()-0.5)*1.8,s=4+Math.random()*14;
        particles.push({wx:m.wx,wy:m.wy,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,color:i%3===0?'#8B0000':i%3===1?'#CC0000':'#FF1744',size:3+Math.random()*8,type:'drop'});}
      chunks(m.wx,m.wy,'#9E9E9E',14);ring(m.wx,m.wy,'#AA0000',6,4); break;
    case 'KNIFE':
      sfxKnife();
      burst(m.wx,m.wy,'#CC0000',30,7);chunks(m.wx,m.wy,'#BDBDBD',10);chunks(m.wx,m.wy,'#CC0000',18);
      for(let s of[-1,1]){
        particles.push({wx:m.wx,wy:m.wy,vx:s*9,vy:-4,life:1,color:'#9E9E9E',size:18,type:'chunk',rot:0,rs:s*0.22});
        particles.push({wx:m.wx,wy:m.wy,vx:s*5,vy:-2,life:1,color:'#CC0000',size:10,type:'chunk',rot:0.5,rs:s*0.15});
      }
      ring(m.wx,m.wy,'#880000',4,5); break;
    case 'CACTUS':
      sfxCactus();
      burst(m.wx,m.wy,'#CC0000',28,6);burst(m.wx,m.wy,'#4CAF50',16,4);chunks(m.wx,m.wy,'#9E9E9E',12);
      for(let i=0;i<8;i++) particles.push({wx:m.wx+(Math.random()-.5)*25,wy:m.wy,vx:(Math.random()-.5)*3,vy:-Math.random()*5-1,life:1,color:'#2E7D32',size:5+Math.random()*7,type:'chunk',rot:Math.random()*Math.PI*2,rs:(Math.random()-.5)*.2}); break;
    case 'ACID':
      sfxAcid();
      for(let i=0;i<50;i++) particles.push({wx:m.wx+(Math.random()-0.5)*50,wy:m.wy,vx:(Math.random()-0.5)*3.5,vy:-Math.random()*7-1,life:1,color:i%3===0?'#76FF03':i%3===1?'#CCFF90':'#B2FF59',size:4+Math.random()*10,type:'bubble'});
      chunks(m.wx,m.wy,'#9E9E9E',10);ring(m.wx,m.wy,'#76FF03',10,6); break;
    case 'SAW':

      ring(m.wx,m.wy,'#FF8800',12,5);ring(m.wx,m.wy,'#FFEB3B',6,7); break;

      sfxSaw();
      burst(m.wx,m.wy,'#CC0000',38,10);burst(m.wx,m.wy,'#FF1744',18,6);

      burst(m.wx,m.wy,'#FFFF00',48,14);burst(m.wx,m.wy,'#FFF9C4',30,10);

function burst(wx2,wy2,col,n,spd){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=spd*(0.4+Math.random()*0.9);particles.push({wx:wx2,wy:wy2,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,life:1,color:col,size:3+Math.random()*7,type:'normal'});}}
function chunks(wx2,wy2,col,n){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=3+Math.random()*9;particles.push({wx:wx2,wy:wy2,vx:Math.cos(a)*s,vy:Math.sin(a)*s-5,life:1,color:col,size:5+Math.random()*9,type:'chunk',rot:Math.random()*Math.PI*2,rs:(Math.random()-0.5)*0.3});}}

function addDeathPose(type, wx, wy, mvx, mvy) {

    case 'SPIKE':
      deathPoses.push({type:'SPIKE_POSE', wx, wy, timer:300, maxTimer:300});
      break;

      deathPoses.push({type:'SAW_TOP', wx, wy, vx:mvx*0.15+0.5, vy:-3.5-spd*0.08, rot:0, rs:-0.13, timer:220, maxTimer:220});
      deathPoses.push({type:'SAW_BOT', wx, wy, vx:mvx*0.15+0.5, vy:1.5+spd*0.04, rot:0, rs:0.11,  timer:220, maxTimer:220});

      deathPoses.push({type:'KNIFE_R', wx, wy, vx: 1.5, vy:-0.8, rot:0, rs: 0.07, timer:220, maxTimer:220});
      break;
    case 'TNT':
      [['head',0,-14],['body',0,0],['leg1',-8,8],['leg2',8,8],['leg3',-6,4],['leg4',6,4]].forEach(([part,ox,oy])=>{
        const a=Math.random()*Math.PI*2, s=3+Math.random()*9;

      });
      break;

      deathPoses.push({type:'CACTUS_POSE', wx, wy, timer:280, maxTimer:280});
      break;
    case 'ACID':
      deathPoses.push({type:'ACID_POSE', wx, wy, timer:240, maxTimer:240});
      break;
    case 'BEAR':
      deathPoses.push({type:'BEAR_POSE', wx, wy, timer:260, maxTimer:260});
      break;

      break;

      [['head',0,-14],['body',0,0],['leg1',-8,8],['leg2',8,8]].forEach(([part,ox,oy])=>{
        const a=Math.random()*Math.PI*2, s=3+Math.random()*9;

          vx:Math.cos(a)*s+mvx*0.1, vy:Math.sin(a)*s-4,
