      deathPoses.push({type:'SAW_BOT', wx, wy, vx:mvx*0.15+0.5, vy:1.5+Math.hypot(mvx,mvy)*0.04, rot:0, rs:0.11, timer:220, maxTimer:220});
      break;
    case 'LIGHTNING':
      deathPoses.push({type:'LIGHTNING_POSE', wx, wy, timer:200, maxTimer:200});
      break;
  }
}

function updateDeathPoses() {
  deathPoses.forEach(d=>{
    d.timer--;
    if(d.vx !== undefined){ // parti volanti
      d.wx += d.vx; d.wy += d.vy;
      d.vy += 0.14; d.vx *= 0.98;
      if(d.wy > GY-4){ d.wy=GY-4; d.vy*=-0.25; d.vx*=0.75; }
    }
    if(d.rot !== undefined) d.rot += d.rs||0;
  });
  deathPoses = deathPoses.filter(d=>d.timer>0);
}

// helpers disegno cadavere
function xEyes(ox,oy){
  ctx.strokeStyle='#111'; ctx.lineWidth=2; ctx.lineCap='round';
  [-3,4].forEach(ex=>{
    ctx.beginPath(); ctx.moveTo(ox+ex-3,oy-3); ctx.lineTo(ox+ex+3,oy+3); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(ox+ex+3,oy-3); ctx.lineTo(ox+ex-3,oy+3); ctx.stroke();
  });
}
function tongue(ox,oy){
  ctx.fillStyle='#E91E63'; ctx.beginPath(); ctx.ellipse(ox,oy,3.5,6,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#C2185B'; ctx.beginPath(); ctx.ellipse(ox,oy+4,3,3,0,0,Math.PI*2); ctx.fill();
}
function bloodPool(ox,oy,r){
  ctx.fillStyle='rgba(90,0,0,0.82)'; ctx.beginPath(); ctx.ellipse(ox,oy,r,r*0.3,0,0,Math.PI*2); ctx.fill();
}
function mouseBody(charred){
  const c=charred?'#666':'#9E9E9E', c2=charred?'#888':'#BDBDBD';
  ctx.fillStyle=c; ctx.beginPath(); ctx.ellipse(0,0,18,13,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=c2; ctx.beginPath(); ctx.ellipse(2,2,11,8,0,0,Math.PI*2); ctx.fill();
}
function mouseHead(ox,oy){
  ctx.fillStyle='#BDBDBD'; ctx.beginPath(); ctx.arc(ox,oy,12,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#EF9A9A'; ctx.beginPath(); ctx.arc(ox-4,oy-10,7,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#BDBDBD'; ctx.beginPath(); ctx.arc(ox-4,oy-10,4,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#EF9A9A'; ctx.beginPath(); ctx.arc(ox+4,oy-9,6,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#BDBDBD'; ctx.beginPath(); ctx.arc(ox+4,oy-9,3.5,0,Math.PI*2); ctx.fill();
}
function legs(){
  ctx.strokeStyle='#757575'; ctx.lineWidth=3; ctx.lineCap='round';
  [[-9,8,-18,20],[-4,10,-8,22],[8,8,18,20],[4,10,9,22]].forEach(([x1,y1,x2,y2])=>{
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
    ctx.fillStyle='#EF9A9A'; ctx.beginPath(); ctx.arc(x2,y2,3.5,0,Math.PI*2); ctx.fill();
  });
}

function drawDeathPoses() {
  deathPoses.forEach(d=>{
    const sx = d.wx - cam.x;
    if(sx < -200 || sx > W+200) return;
    const fade = d.timer < 50 ? d.timer/50 : 1;
    ctx.save(); ctx.globalAlpha = fade;

    switch(d.type) {

      case 'SPIKE_POSE': {
        const prog = 1 - d.timer/d.maxTimer;
        const drip = Math.min(40, prog*120);
        ctx.translate(sx, d.wy);
        // rivolo sopra
        ctx.fillStyle='rgba(160,0,0,0.85)';
        ctx.beginPath(); ctx.moveTo(-3,-20); ctx.lineTo(-4,-20+drip); ctx.lineTo(4,-20+drip); ctx.lineTo(3,-20); ctx.fill();
        // corpo con buco dello spike
        mouseBody(false);
        ctx.fillStyle='rgba(40,0,0,0.95)'; ctx.beginPath(); ctx.ellipse(0,0,4,13,0,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='rgba(180,0,0,0.75)'; ctx.beginPath(); ctx.ellipse(0,0,9,9,0,0,Math.PI*2); ctx.fill();
        // testa caduta di lato
        mouseHead(14,10);
        xEyes(18,10); tongue(22,18);
        // zampe penzolanti verso il basso
        legs();
        // pozza sangue
        bloodPool(0, 28, 14+drip*0.25);
        break;
      }

      case 'SAW_TOP': {
        ctx.save(); ctx.translate(sx, d.wy); ctx.rotate(d.rot);
        ctx.beginPath(); ctx.rect(-40,-40,80,40); ctx.clip();
        mouseBody(false);
        mouseHead(18,-2);
        xEyes(22,-6);
        // bordo tagliato
        ctx.strokeStyle='rgba(180,0,0,0.95)'; ctx.lineWidth=3;
        ctx.beginPath(); ctx.moveTo(-20,0); ctx.lineTo(32,0); ctx.stroke();
        // gocce sangue giù
        ctx.fillStyle='rgba(160,0,0,0.85)';
        [-14,-6,4,12,20].forEach(bx=>{
          const dl=Math.min(18,(1-d.timer/d.maxTimer)*60);
          ctx.beginPath(); ctx.moveTo(bx,0); ctx.lineTo(bx-1,dl); ctx.lineTo(bx+1,dl); ctx.fill();
        });
        ctx.restore();
        break;
      }

      case 'SAW_BOT': {
        ctx.save(); ctx.translate(sx, d.wy); ctx.rotate(d.rot);
        ctx.beginPath(); ctx.rect(-40,0,80,40); ctx.clip();
        mouseBody(false);
        legs();
        ctx.strokeStyle='#9E9E9E'; ctx.lineWidth=2;
        ctx.beginPath(); ctx.moveTo(-16,3); ctx.quadraticCurveTo(-28,10,-34,4); ctx.stroke();
        // intestini pendenti
        const sag = Math.min(20,(1-d.timer/d.maxTimer)*60);
        ctx.strokeStyle='#FF8A65'; ctx.lineWidth=4; ctx.lineCap='round';
        ctx.beginPath(); ctx.moveTo(-8,0); ctx.quadraticCurveTo(-2,sag,4,sag*0.7); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(6,0); ctx.quadraticCurveTo(12,sag*0.5,16,sag*0.3); ctx.stroke();
        ctx.strokeStyle='rgba(160,0,0,0.9)'; ctx.lineWidth=2.5;
        ctx.beginPath(); ctx.moveTo(-20,0); ctx.lineTo(30,0); ctx.stroke();
        ctx.restore();
        break;
      }

      case 'KNIFE_L': {
        ctx.save(); ctx.translate(sx, d.wy); ctx.rotate(d.rot);
        ctx.beginPath(); ctx.rect(-40,-20,40,36); ctx.clip();
        mouseBody(false);
        ctx.fillStyle='rgba(150,0,0,0.8)'; ctx.beginPath(); ctx.ellipse(0,0,3,13,0,0,Math.PI*2); ctx.fill();
        ctx.strokeStyle='rgba(180,0,0,0.9)'; ctx.lineWidth=2.5;
        ctx.beginPath(); ctx.moveTo(0,-14); ctx.lineTo(0,14); ctx.stroke();
        ctx.strokeStyle='#757575'; ctx.lineWidth=3; ctx.lineCap='round';
        [[-8,6,-18,18],[-8,-4,-18,6]].forEach(([x1,y1,x2,y2])=>{
          ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
          ctx.fillStyle='#EF9A9A'; ctx.beginPath(); ctx.arc(x2,y2,3.5,0,Math.PI*2); ctx.fill();
        });
        ctx.restore();
        break;
      }

      case 'KNIFE_R': {
        ctx.save(); ctx.translate(sx, d.wy); ctx.rotate(d.rot);
        ctx.beginPath(); ctx.rect(0,-20,40,36); ctx.clip();
        mouseBody(false);
        ctx.fillStyle='rgba(150,0,0,0.8)'; ctx.beginPath(); ctx.ellipse(0,0,3,13,0,0,Math.PI*2); ctx.fill();
        ctx.strokeStyle='rgba(180,0,0,0.9)'; ctx.lineWidth=2.5;
        ctx.beginPath(); ctx.moveTo(0,-14); ctx.lineTo(0,14); ctx.stroke();
        mouseHead(18,-1); xEyes(22,-5); tongue(28,6);
        ctx.strokeStyle='#757575'; ctx.lineWidth=3; ctx.lineCap='round';
        [[8,6,18,18],[8,-4,18,6]].forEach(([x1,y1,x2,y2])=>{
          ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
          ctx.fillStyle='#EF9A9A'; ctx.beginPath(); ctx.arc(x2,y2,3.5,0,Math.PI*2); ctx.fill();
        });
        ctx.restore();
        break;
      }

      case 'TNT_PART': {
        ctx.save(); ctx.translate(sx, d.wy); ctx.rotate(d.rot);
        switch(d.part){
          case 'head':
            ctx.fillStyle='#666'; ctx.beginPath(); ctx.arc(0,0,10,0,Math.PI*2); ctx.fill();
            ctx.fillStyle='#EF9A9A'; ctx.beginPath(); ctx.arc(-3,-8,5,0,Math.PI*2); ctx.fill();
            ctx.fillStyle='#666'; ctx.beginPath(); ctx.arc(-3,-8,3,0,Math.PI*2); ctx.fill();
            xEyes(2,0); tongue(5,6);
            ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.beginPath(); ctx.arc(-3,3,4,0,Math.PI*2); ctx.fill();
            break;
          case 'body':
            ctx.fillStyle='#666'; ctx.beginPath(); ctx.ellipse(0,0,14,9,0,0,Math.PI*2); ctx.fill();
            ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.beginPath(); ctx.arc(3,-1,5,0,Math.PI*2); ctx.fill();
            ctx.strokeStyle='#FF8A65'; ctx.lineWidth=2;
            ctx.beginPath(); ctx.moveTo(-3,-7); ctx.quadraticCurveTo(5,1,1,7); ctx.stroke();
            break;
          default:
            ctx.fillStyle='#888'; ctx.beginPath(); ctx.ellipse(0,0,4,8,0,0,Math.PI*2); ctx.fill();
            ctx.fillStyle='#EF9A9A'; ctx.beginPath(); ctx.arc(0,9,3.5,0,Math.PI*2); ctx.fill();
        }
        ctx.restore();
        break;
      }

      case 'CACTUS_POSE': {
        ctx.save(); ctx.translate(sx, d.wy);
        // corpo appiattito sugli spuntoni
        ctx.fillStyle='rgba(158,158,158,0.9)';
        ctx.beginPath(); ctx.ellipse(0,0,27,5,0,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='rgba(140,0,0,0.65)';
        ctx.beginPath(); ctx.ellipse(0,3,24,5,0,0,Math.PI*2); ctx.fill();
        // testa schiacciata
        ctx.fillStyle='#BDBDBD'; ctx.beginPath(); ctx.ellipse(24,0,10,4,0,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='#EF9A9A'; ctx.beginPath(); ctx.ellipse(20,-5,5,2.5,0,0,Math.PI*2); ctx.fill();
        xEyes(28,0); tongue(31,4);
        // zampe pendule
        ctx.strokeStyle='#757575'; ctx.lineWidth=2.5; ctx.lineCap='round';
        [[-16,0,-16,14],[-6,0,-6,16],[6,0,6,15],[14,0,14,13]].forEach(([x1,y1,x2,y2])=>{
          ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
          ctx.fillStyle='#EF9A9A'; ctx.beginPath(); ctx.arc(x2,y2,3,0,Math.PI*2); ctx.fill();
        });
        bloodPool(0, 8, 16);
        ctx.restore();
        break;
      }

      case 'ACID_POSE': {
        const prog = 1 - d.timer/d.maxTimer;
        const sc = Math.max(0.04, 1-prog*0.97);
        const g = Math.floor(Math.min(200, prog*400));
        ctx.save(); ctx.translate(sx, d.wy); ctx.scale(sc, sc*0.5);
        ctx.fillStyle=`rgb(${Math.floor(158*(1-prog))},${g},0)`;
        ctx.beginPath(); ctx.ellipse(0,0,18,13,0,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(18,-1,13,0,Math.PI*2); ctx.fill();
        if(prog>0.45){
          ctx.strokeStyle=`rgba(210,200,180,${(prog-0.45)*1.8})`; ctx.lineWidth=3;
          ctx.beginPath(); ctx.moveTo(-12,0); ctx.lineTo(22,0); ctx.stroke();
          ctx.beginPath(); ctx.arc(22,0,7,0,Math.PI*2); ctx.stroke();
        }
        // bollicine
        ctx.fillStyle='rgba(80,255,30,0.45)';
        for(let i=0;i<4;i++){
          ctx.beginPath(); ctx.arc(Math.sin(i*2.1+T*0.08)*14,Math.cos(i*1.8+T*0.07)*10,3,0,Math.PI*2); ctx.fill();
        }
        ctx.restore();
        break;
      }

      case 'BEAR_POSE': {
        ctx.save(); ctx.translate(sx, d.wy);
        // corpo compresso
        ctx.fillStyle='#9E9E9E';
        ctx.beginPath(); ctx.ellipse(0,-12,15,7,0,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(0,12,15,7,0,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='rgba(160,0,0,0.9)';
        ctx.beginPath(); ctx.ellipse(0,0,16,3,0,0,Math.PI*2); ctx.fill();
        // occhi che schizzano fuori lateralmente
        ctx.fillStyle='white'; ctx.strokeStyle='#111'; ctx.lineWidth=1.5;
        [[-22,-8],[22,-8]].forEach(([ex,ey])=>{
          ctx.beginPath(); ctx.arc(ex,ey,6,0,Math.PI*2); ctx.fill(); ctx.stroke();
          ctx.fillStyle='#111'; ctx.beginPath(); ctx.arc(ex,ey,3,0,Math.PI*2); ctx.fill();
          ctx.fillStyle='white';
        });
        // testa deformata sopra
        ctx.fillStyle='#BDBDBD'; ctx.beginPath(); ctx.ellipse(12,-22,9,7,0.4,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='#EF9A9A'; ctx.beginPath(); ctx.arc(10,-30,5,0,Math.PI*2); ctx.fill();
        xEyes(16,-22); tongue(20,-16);
        bloodPool(0, 18, 18);
        ctx.restore();
        break;
      }

      case 'GROUND_POSE': {
        ctx.save(); ctx.translate(sx, d.wy);
        ctx.fillStyle='rgba(110,110,110,0.9)';
        ctx.beginPath(); ctx.ellipse(0,0,32,4,0,0,Math.PI*2); ctx.fill();
        bloodPool(0,5,26);
        ctx.fillStyle='rgba(175,175,175,0.9)'; ctx.beginPath(); ctx.ellipse(28,0,12,3,0,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='rgba(239,154,154,0.85)'; ctx.beginPath(); ctx.arc(26,-5,4.5,0,Math.PI*2); ctx.fill();
        xEyes(32,0); tongue(36,3);
        ctx.font='11px serif'; ctx.textAlign='center';
        for(let i=0;i<4;i++){
          const a=(i/4)*Math.PI*2+T*0.025;
          ctx.fillStyle=`rgba(255,230,50,${0.6+0.3*Math.sin(T*0.1+i)})`;
          ctx.fillText('★', Math.cos(a)*22, Math.sin(a)*14-12);
        }
        ctx.restore();
        break;
      }

      case 'BIRD_POSE': {
        ctx.save(); ctx.translate(sx, d.wy);
        ctx.rotate(Math.PI*.48);
        mouseBody(false); mouseHead(18,0); xEyes(22,-5); tongue(28,8);
        // piume sparse
        ctx.fillStyle='rgba(96,125,139,0.85)';
        [[-18,16],[0,22],[18,15],[-8,12],[10,20]].forEach(([fx,fy])=>{
          ctx.save(); ctx.translate(fx,fy); ctx.rotate(fx*.08);
          ctx.beginPath(); ctx.ellipse(0,0,7,2.5,0,0,Math.PI*2); ctx.fill();
          ctx.restore();
        });
        bloodPool(0,10,13);
        ctx.restore();
        break;
      }

      case 'LIGHTNING_POSE': {
        const prog = 1 - d.timer/d.maxTimer;
        const flash = Math.sin(T*0.4+prog*Math.PI*2)*0.5 + 0.5;
        ctx.save(); ctx.translate(sx, d.wy);
        ctx.globalAlpha = Math.max(0, 1 - prog*0.8);
        ctx.fillStyle='#FFF9C4'; ctx.shadowColor='#FFFF00'; ctx.shadowBlur=20;
        ctx.beginPath(); ctx.ellipse(0,0,20,15,0,0,Math.PI*2); ctx.fill();
        ctx.globalAlpha = 1;
        ctx.fillStyle='#666'; ctx.beginPath(); ctx.arc(18,-1,12,0,Math.PI*2); ctx.fill();
        xEyes(22,-5); tongue(28,6);
        if(flash>0.6) ctx.fillStyle='#FFFF00'; else ctx.fillStyle='rgba(80,80,80,0.9)';
        ctx.beginPath(); ctx.ellipse(0,8,23,4,0,0,Math.PI*2); ctx.fill();
        ctx.restore();
        break;
      }
    }
    ctx.restore();
  });
}

// ─── ANIMAZIONE 3 SECONDI ─────────────────────────────────────────────────
// Helper condivisi
function _body(col){ ctx.fillStyle=col||'#9E9E9E'; ctx.beginPath(); ctx.ellipse(0,0,18,13,0,0,Math.PI*2); ctx.fill(); }
function _head(ox,oy){ ctx.fillStyle='#BDBDBD'; ctx.beginPath(); ctx.arc(ox,oy,12,0,Math.PI*2); ctx.fill(); ctx.fillStyle='#EF9A9A'; ctx.beginPath(); ctx.arc(ox-4,oy-9,7,0,Math.PI*2); ctx.fill(); ctx.fillStyle='#BDBDBD'; ctx.beginPath(); ctx.arc(ox-4,oy-9,4,0,Math.PI*2); ctx.fill(); }
function _xeyes(ox,oy){ ctx.strokeStyle='#111'; ctx.lineWidth=2.5; ctx.lineCap='round'; [-3,4].forEach(ex=>{ ctx.beginPath(); ctx.moveTo(ox+ex-3,oy-3); ctx.lineTo(ox+ex+3,oy+3); ctx.stroke(); ctx.beginPath(); ctx.moveTo(ox+ex+3,oy-3); ctx.lineTo(ox+ex-3,oy+3); ctx.stroke(); }); }
function _tongue(ox,oy){ ctx.fillStyle='#E91E63'; ctx.beginPath(); ctx.ellipse(ox,oy,3.5,6,0,0,Math.PI*2); ctx.fill(); ctx.fillStyle='#C2185B'; ctx.beginPath(); ctx.ellipse(ox,oy+4,3,3,0,0,Math.PI*2); ctx.fill(); }
function _legs(){ ctx.strokeStyle='#757575'; ctx.lineWidth=3; ctx.lineCap='round'; [[-9,8,-18,22],[-4,10,-8,24],[8,8,18,22],[4,10,9,24]].forEach(([x1,y1,x2,y2])=>{ ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke(); ctx.fillStyle='#EF9A9A'; ctx.beginPath(); ctx.arc(x2,y2,3.5,0,Math.PI*2); ctx.fill(); }); }
function _tail(sway){ ctx.strokeStyle='#9E9E9E'; ctx.lineWidth=2.5; ctx.lineCap='round'; ctx.beginPath(); ctx.moveTo(-17,3); ctx.quadraticCurveTo(-28,-8+(sway||0),-38,2+(sway||0)*0.5); ctx.stroke(); }
function _blood(r){ ctx.fillStyle='rgba(100,0,0,0.85)'; ctx.beginPath(); ctx.ellipse(0,0,r,r*0.28,0,0,Math.PI*2); ctx.fill(); }
function _drip(x,y,len){ ctx.strokeStyle='rgba(160,0,0,0.85)'; ctx.lineWidth=2.5; ctx.lineCap='round'; ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x+(Math.random()-0.5)*3,y+len); ctx.stroke(); }
function _stars(p,r){ ctx.font='13px serif'; ctx.textAlign='center'; for(let i=0;i<4;i++){ const a=(i/4)*Math.PI*2+p*Math.PI*8; ctx.fillStyle=`rgba(255,230,50,${0.7+0.3*Math.sin(a*3)})`; ctx.fillText('★',Math.cos(a)*r,Math.sin(a)*r*0.6-18); } }

function drawAnimOverlay(){
  if(!animState) return;
  const p = animState.t / animState.dur; // 0→1
  const sx = animState.wx - cam.x;
  const sy = animState.wy;
  ctx.save();

  if(animState.phase === 'safe'){
    _animSafe(sx, sy, p);
  } else {
    switch(animState.deathType){
      case 'SPIKE':  _animSpike(sx,sy,p); break;
      case 'SAW':    _animSaw(sx,sy,p);   break;
      case 'KNIFE':  _animKnife(sx,sy,p); break;
      case 'TNT':    _animTNT(sx,sy,p);   break;
      case 'CACTUS': _animCactus(sx,sy,p);break;
      case 'ACID':   _animAcid(sx,sy,p);  break;
      case 'BEAR':   _animBear(sx,sy,p);  break;
      case 'GROUND': _animGround(sx,sy,p);break;
      case 'BIRD':     _animBird(sx,sy,p);  break;
      case 'PLANE':    _animTNT(sx,sy,p);   break;
      case 'CHAINSAW': _animSaw(sx,sy,p);   break;
      case 'LIGHTNING': _animTNT(sx,sy,p);  break;
    }
  }
  ctx.restore();
}

// ── SALVO: topo malconcio si rialza e sventola bandiera ─────────────────
function _animSafe(sx,sy,p){
  ctx.translate(sx,sy);

  // Helper: faccia malconcia (occhio nero + dente rotto) centrata su (ox,oy)
  function _beatFace(ox,oy){
    ctx.fillStyle='#BDBDBD'; ctx.beginPath(); ctx.arc(ox,oy,12,0,Math.PI*2); ctx.fill();
    // orecchie
    ctx.fillStyle='#EF9A9A'; ctx.beginPath(); ctx.arc(ox-5,oy-10,7,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#BDBDBD'; ctx.beginPath(); ctx.arc(ox-5,oy-10,4,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#EF9A9A'; ctx.beginPath(); ctx.arc(ox+5,oy-9,6,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#BDBDBD'; ctx.beginPath(); ctx.arc(ox+5,oy-9,3.5,0,Math.PI*2); ctx.fill();
    // occhio nero (sinistro, pesto)
    ctx.fillStyle='rgba(55,10,80,0.8)'; ctx.beginPath(); ctx.ellipse(ox-3,oy-3,7,5,.2,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#111'; ctx.beginPath(); ctx.arc(ox-3,oy-3,2.5,0,Math.PI*2); ctx.fill();
    // occhio normale (destro)
    ctx.fillStyle='#111'; ctx.beginPath(); ctx.arc(ox+5,oy-3,3,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='white'; ctx.beginPath(); ctx.arc(ox+6,oy-4,1.2,0,Math.PI*2); ctx.fill();
    // naso
    ctx.fillStyle='#E91E63'; ctx.beginPath(); ctx.arc(ox+2,oy+2,3,0,Math.PI*2); ctx.fill();
    // dente rotto
    ctx.fillStyle='rgba(255,255,200,.95)';
    ctx.beginPath(); ctx.moveTo(ox-2,oy+6); ctx.lineTo(ox+1,oy+6); ctx.lineTo(ox+.5,oy+11); ctx.lineTo(ox-2,oy+11); ctx.fill();
    ctx.strokeStyle='rgba(100,80,0,.6)'; ctx.lineWidth=.8;
    ctx.beginPath(); ctx.moveTo(ox,oy+6); ctx.lineTo(ox+.5,oy+10); ctx.stroke();
  }

  if(p < 0.28){
    // FASE 1: stordito a terra
    const pp=p/0.28;
    ctx.rotate(Math.PI*.48);
    _body(); _beatFace(18,-1); _tongue(26,10); _legs(); _tail(0);
    _stars(pp,28);
    if(Math.sin(pp*Math.PI*8)>.2){ ctx.fillStyle='#BDBDBD'; ctx.fillRect(14,-7,16,5); }

  } else if(p < 0.55){
    // FASE 2: si tira su barcollando
    const pp=(p-0.28)/.27;
    ctx.rotate(Math.PI*.48*(1-pp));
    ctx.translate(Math.sin(pp*Math.PI*5)*3,0);
    _body(); _beatFace(18,-1); _legs(); _tail(0);

  } else {
    // FASE 3 & 4: in piedi sulle zampe posteriori
    const pp3=p<.78?(p-.55)/.23:1, pp4=p>=.78?(p-.78)/.22:0;
    const wobble=p<.78?Math.sin(pp3*Math.PI*5)*.07:Math.sin(pp4*Math.PI*3)*.04;

    ctx.save();
    ctx.translate(0,-12); // alza corpo di 12px
    ctx.rotate(wobble);

    // ZAMPE POSTERIORI (gambe)
    ctx.strokeStyle='#757575'; ctx.lineWidth=3.5; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(-6,12); ctx.lineTo(-10,26); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(6,12); ctx.lineTo(10,26); ctx.stroke();
    ctx.fillStyle='#EF9A9A'; ctx.beginPath(); ctx.arc(-10,26,4,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#EF9A9A'; ctx.beginPath(); ctx.arc(10,26,4,0,Math.PI*2); ctx.fill();

    // CORPO verticale
    ctx.fillStyle='#9E9E9E'; ctx.beginPath(); ctx.ellipse(0,0,12,18,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#BDBDBD'; ctx.beginPath(); ctx.ellipse(1,1,8,12,0,0,Math.PI*2); ctx.fill();

    if(p < 0.78){
      // Fase 3: zampe anteriori che scrollano la polvere
      const da=Math.sin(pp3*Math.PI*7)*.8;
      ctx.strokeStyle='#9E9E9E'; ctx.lineWidth=3; ctx.lineCap='round';
      ctx.save(); ctx.translate(10,-5); ctx.rotate(-.3+da);
      ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(18,6); ctx.stroke();
      ctx.fillStyle='#EF9A9A'; ctx.beginPath(); ctx.arc(18,6,4,0,Math.PI*2); ctx.fill();
      ctx.restore();
      ctx.save(); ctx.translate(-10,-5); ctx.rotate(.3-da*.7);
      ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-16,4); ctx.stroke();
      ctx.fillStyle='#EF9A9A'; ctx.beginPath(); ctx.arc(-16,4,4,0,Math.PI*2); ctx.fill();
      ctx.restore();
    } else {
      // Fase 4: un braccio in alto con bandiera, uno abbassato
      const fs=Math.sin(pp4*Math.PI*4)*.28;
      ctx.strokeStyle='#9E9E9E'; ctx.lineWidth=3; ctx.lineCap='round';
      // braccio con bandiera (su, destra)
      ctx.save(); ctx.translate(10,-5); ctx.rotate(-1.0+fs*.5);
      ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0,-20); ctx.stroke();
      ctx.fillStyle='#EF9A9A'; ctx.beginPath(); ctx.arc(0,-20,4,0,Math.PI*2); ctx.fill();
      // asta
      ctx.strokeStyle='#8B5E14'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(0,-20); ctx.lineTo(0,-42); ctx.stroke();
      // bandierina che sventola
      const wv=Math.sin(T*.2)*5;
      ctx.fillStyle='#EE1111';
      ctx.beginPath(); ctx.moveTo(0,-42); ctx.lineTo(16+wv,-37); ctx.lineTo(14+wv*.6,-31); ctx.lineTo(0,-31); ctx.closePath(); ctx.fill();
      ctx.fillStyle='rgba(255,255,255,.85)'; ctx.beginPath(); ctx.arc(8+wv*.7,-37,3,0,Math.PI*2); ctx.fill();
      ctx.restore();
      // braccio abbassato (sinistra)
      ctx.save(); ctx.translate(-10,-5); ctx.rotate(.55);
      ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-14,8); ctx.stroke();
      ctx.fillStyle='#EF9A9A'; ctx.beginPath(); ctx.arc(-14,8,4,0,Math.PI*2); ctx.fill();
      ctx.restore();
    }

    // TESTA malconcia
    _beatFace(0,-25);

    // CODA che sbatte
    ctx.strokeStyle='#9E9E9E'; ctx.lineWidth=2.5; ctx.lineCap='round';
    const ts=p<.78?Math.sin(pp3*Math.PI*6)*10:Math.sin(pp4*Math.PI*6)*16;
    ctx.beginPath(); ctx.moveTo(-3,14); ctx.quadraticCurveTo(-18,24+ts,-28,18+ts*.4); ctx.stroke();

    ctx.restore();

    // nuvolette polvere (solo fase 3)
    if(p<.78){
      ctx.fillStyle='rgba(200,180,150,.28)';
      for(let i=0;i<4;i++){
        const a=(i/4)*Math.PI*2+pp3*Math.PI*4;
        ctx.beginPath(); ctx.arc(Math.cos(a)*24,Math.sin(a)*10,3+pp3*6,0,Math.PI*2); ctx.fill();
      }
    }
    // testo vittoria (fase 4)
    if(p>=.78){
      ctx.save();
      ctx.font='bold 15px Arial Black'; ctx.textAlign='center';
      ctx.shadowColor='#003300'; ctx.shadowBlur=8;
      ctx.fillStyle='#AAFFAA';
      ctx.fillText('VIVO PER MIRACOLO! 😅',0,-78-Math.sin(pp4*Math.PI)*5);
      ctx.shadowBlur=0;
      ctx.restore();
    }
  }
}

// ── SPIKE: impalato, sangue a fontana ─────────────────────────────────────
function _animSpike(sx,sy,p){
  ctx.translate(sx,sy);
  // corpo impalato
  _body();
  // foro dello spike
  ctx.fillStyle='rgba(30,0,0,0.95)'; ctx.beginPath(); ctx.ellipse(0,0,4,13,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(180,0,0,0.8)'; ctx.beginPath(); ctx.ellipse(0,0,9,9,0,0,Math.PI*2); ctx.fill();
  // testa penzolante
  const headTilt = Math.min(0.9, p*3)*0.9;
  ctx.save(); ctx.translate(18,2); ctx.rotate(headTilt);
  _head(0,0); _xeyes(4,-2); _tongue(8,8);
  ctx.restore();
  // zampe penzolanti (si abbassano nel tempo)
  ctx.strokeStyle='#757575'; ctx.lineWidth=3; ctx.lineCap='round';
  const sag=Math.min(1,p*2)*12;
  [[-9,10,-18,22+sag],[-3,10,-6,24+sag],[8,10,18,22+sag],[4,10,9,24+sag]].forEach(([x1,y1,x2,y2])=>{
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
    ctx.fillStyle='#EF9A9A'; ctx.beginPath(); ctx.arc(x2,y2,3.5,0,Math.PI*2); ctx.fill();
  });
  // fontana di sangue — 5 pulsazioni
  const pulses=[0.04,0.18,0.32,0.46,0.60];
  pulses.forEach(start=>{
    const pp=p-start; if(pp<0||pp>0.30) return;
    const h=Math.sin(pp/0.30*Math.PI)*75;
    ctx.strokeStyle='rgba(200,0,0,0.9)'; ctx.lineWidth=5;
    ctx.beginPath(); ctx.moveTo(-4,-10); ctx.quadraticCurveTo(-12,-10-h,-2,-10-h*1.3); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(4,-10); ctx.quadraticCurveTo(14,-10-h*0.85,6,-10-h*1.2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,-10); ctx.quadraticCurveTo(3,-10-h*0.7,0,-10-h*1.05); ctx.stroke();
    // gocce con splash
    ctx.fillStyle='rgba(200,0,0,0.85)';
    [-2,0,3].forEach(dx=>{ ctx.beginPath(); ctx.arc(dx,-10-h*(1.2+dx*.01),4+Math.abs(dx),0,Math.PI*2); ctx.fill(); });
  });
  // rivoli multipli che scendono
  const drip=Math.min(45,p*130);
  [-3,0,3,-1.5,1.5].forEach((dx,i)=>_drip(dx,12,drip*(1-i*.12)));
  // pozza che cresce rapidamente
  _blood(Math.min(35,p*80));
  // schizzi laterali nelle prime fasi
  if(p<0.25){
    const sp=p/0.25;
    ctx.fillStyle='rgba(180,0,0,0.7)';
    [[-32,-8,1.2],[-28,-14,.9],[32,-8,-1.2],[28,-14,-.9]].forEach(([bx,by,vx])=>{
      ctx.beginPath(); ctx.arc(bx*sp,by,4,0,Math.PI*2); ctx.fill();
    });
  }
}

// ── SAW: tagliato a metà ──────────────────────────────────────────────────
function _animSaw(sx,sy,p){
  // simula fisica delle due metà
  const g=0.15;
  const topX=sx + (animState.mvx*0.12+0.5)*animState.t;
  const topY=sy + (-3.5)*animState.t + 0.5*g*animState.t*animState.t;
  const botX=sx + (animState.mvx*0.12+0.4)*animState.t;
  const botY=sy + (1.5)*animState.t + 0.5*g*animState.t*animState.t;
  const topRot = -0.12*animState.t;
  const botRot =  0.10*animState.t;

  // metà superiore
  ctx.save(); ctx.translate(topX, Math.min(GY-20,topY)); ctx.rotate(topRot);
  ctx.beginPath(); ctx.rect(-40,-40,80,40); ctx.clip();
  _body(); _head(18,-1); _xeyes(22,-5);
  ctx.strokeStyle='rgba(180,0,0,0.95)'; ctx.lineWidth=3; ctx.beginPath(); ctx.moveTo(-20,0); ctx.lineTo(32,0); ctx.stroke();
  const gd=Math.min(22,p*70); [-14,-5,5,15].forEach(bx=>_drip(bx,0,gd));
  ctx.restore();

  // metà inferiore
  ctx.save(); ctx.translate(botX, Math.min(GY-10,botY)); ctx.rotate(botRot);
  ctx.beginPath(); ctx.rect(-40,0,80,40); ctx.clip();
  _body(); _legs(); _tail(0);
  // intestini
  const sg=Math.min(22,p*66);
  ctx.strokeStyle='#FF8A65'; ctx.lineWidth=5; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-8,0); ctx.quadraticCurveTo(-2,sg,4,sg*0.7); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(6,0); ctx.quadraticCurveTo(12,sg*0.5,16,sg*0.3); ctx.stroke();
  ctx.strokeStyle='rgba(160,0,0,0.9)'; ctx.lineWidth=2.5; ctx.beginPath(); ctx.moveTo(-20,0); ctx.lineTo(30,0); ctx.stroke();
  ctx.restore();

  // schizzi sangue iniziali
  if(p<0.12){
    const sp=p/0.12;
    ctx.save(); ctx.translate(sx,sy);
    ctx.globalAlpha=1-sp;
    ctx.fillStyle='rgba(200,0,0,0.9)';
    for(let i=0;i<8;i++){
      const a=(i/8)*Math.PI*2, d=sp*60;
      ctx.beginPath(); ctx.arc(Math.cos(a)*d,Math.sin(a)*d,5,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }
  // pozza sangue al punto di impatto — cresce molto
  if(p>0.25){ ctx.save(); ctx.translate(sx,GY-2); _blood(Math.min(45,(p-0.25)*110)); ctx.restore(); }
}

// ── KNIFE: tagliato verticalmente ────────────────────────────────────────
function _animKnife(sx,sy,p){
  const sep=Math.min(30,p*90);
  // metà sinistra
  ctx.save(); ctx.translate(sx-sep, sy+(p>0.3?Math.min(12,(p-0.3)*40):0));
  ctx.rotate(-p*0.15);
  ctx.beginPath(); ctx.rect(-40,-18,40,36); ctx.clip();
  _body();
  ctx.fillStyle='rgba(150,0,0,0.8)'; ctx.beginPath(); ctx.ellipse(0,0,3,13,0,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='rgba(180,0,0,0.9)'; ctx.lineWidth=2.5; ctx.beginPath(); ctx.moveTo(0,-16); ctx.lineTo(0,16); ctx.stroke();
  _legs(); _tail(0);
  ctx.restore();
  // metà destra (con testa)
  ctx.save(); ctx.translate(sx+sep, sy+(p>0.3?Math.min(12,(p-0.3)*40):0));
  ctx.rotate(p*0.15);
  ctx.beginPath(); ctx.rect(0,-18,40,36); ctx.clip();
  _body(); _head(18,-1); _xeyes(22,-5); _tongue(28,7);
  ctx.fillStyle='rgba(150,0,0,0.8)'; ctx.beginPath(); ctx.ellipse(0,0,3,13,0,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='rgba(180,0,0,0.9)'; ctx.lineWidth=2.5; ctx.beginPath(); ctx.moveTo(0,-16); ctx.lineTo(0,16); ctx.stroke();
  ctx.restore();
  // sangue centrale
  ctx.save(); ctx.translate(sx,sy);
  const ds=Math.min(18,p*55); [-8,0,8].forEach(bx=>_drip(bx,0,ds));
  if(p>0.25){ ctx.translate(0,GY-sy); _blood(Math.min(18,(p-0.25)*55)); }
  ctx.restore();
}

// ── TNT: esplode in pezzi ────────────────────────────────────────────────
function _animTNT(sx,sy,p){
  // luce esplosione + shockwave
  if(p<0.20){
    const ep=p/0.20;
    ctx.save(); ctx.translate(sx,sy);
    ctx.globalAlpha=Math.max(0,1-ep*1.5);
    ctx.fillStyle='#FFFFFF'; ctx.beginPath(); ctx.arc(0,0,200*ep,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#FFF9C4'; ctx.beginPath(); ctx.arc(0,0,150*ep,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#FF8800'; ctx.beginPath(); ctx.arc(0,0,100*ep,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#FF2200'; ctx.beginPath(); ctx.arc(0,0,60*ep,0,Math.PI*2); ctx.fill();
    // shockwave ring
    ctx.globalAlpha=Math.max(0,0.9-ep);
    ctx.strokeStyle='rgba(255,180,60,1)'; ctx.lineWidth=Math.max(1,8*(1-ep));
    ctx.beginPath(); ctx.arc(0,0,200*ep,0,Math.PI*2); ctx.stroke();
    ctx.globalAlpha=1;
    ctx.restore();
  }
  // 6 pezzi con traiettoria balistica
  const parts=[
    {dx:0,dy:-1,vx:0.5,vy:-5, draw:(t)=>{ctx.save();_head(0,0);ctx.fillStyle='rgba(0,0,0,0.5)';ctx.beginPath();ctx.arc(-3,4,5,0,Math.PI*2);ctx.fill();_xeyes(4,0);_tongue(8,7);ctx.restore();}},
    {dx:0,dy:0, vx:-1,vy:-3, draw:()=>{ctx.fillStyle='#666';ctx.beginPath();ctx.ellipse(0,0,14,9,0,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#FF8A65';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(-3,-5);ctx.quadraticCurveTo(5,0,2,6);ctx.stroke();}},
    {dx:-6,dy:4,vx:-3,vy:-4, draw:()=>{ctx.fillStyle='#888';ctx.beginPath();ctx.ellipse(0,0,4,8,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#EF9A9A';ctx.beginPath();ctx.arc(0,9,3.5,0,Math.PI*2);ctx.fill();}},
    {dx:6,dy:4, vx:3, vy:-4, draw:()=>{ctx.fillStyle='#888';ctx.beginPath();ctx.ellipse(0,0,4,8,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#EF9A9A';ctx.beginPath();ctx.arc(0,9,3.5,0,Math.PI*2);ctx.fill();}},
    {dx:-4,dy:2,vx:-2,vy:-3.5,draw:()=>{ctx.fillStyle='#888';ctx.beginPath();ctx.ellipse(0,0,4,7,0,0,Math.PI*2);ctx.fill();}},
    {dx:4,dy:2, vx:2.5,vy:-3, draw:()=>{ctx.fillStyle='#888';ctx.beginPath();ctx.ellipse(0,0,4,7,0,0,Math.PI*2);ctx.fill();}},
  ];
  const g=0.12, tf=animState.t;
  parts.forEach((part,i)=>{
    if(p<0.08) return;
    const tt=tf-14;
    const px=sx+part.dx+part.vx*tt;
    const py=Math.min(GY-8, sy+part.dy+part.vy*tt+0.5*g*tt*tt);
    const rot=(part.vx*0.15)*tt;
    ctx.save(); ctx.translate(px,py); ctx.rotate(rot); part.draw(tt); ctx.restore();
  });
  // fumo
  if(p>0.1){
    ctx.fillStyle=`rgba(100,100,100,${Math.max(0,0.4-p*0.4)})`;
    [0,1,2].forEach(i=>{
      const sp=(p-0.1)*60;
      ctx.beginPath(); ctx.arc(sx+(i-1)*20,sy-20-sp*0.5,8+sp*0.3,0,Math.PI*2); ctx.fill();
    });
  }
}

// ── CACTUS: schiacciato sulle spine ──────────────────────────────────────
function _animCactus(sx,sy,p){
  ctx.translate(sx,sy);
  const squish=Math.min(1,p*4); // si appiattisce velocemente
  ctx.scale(1+squish*0.5, 1-squish*0.6);
  _body('rgba(158,158,158,0.9)');
  // fori delle spine
  ctx.fillStyle='rgba(30,0,0,0.9)';
  [-10,-3,5,12].forEach(bx=>{ctx.beginPath();ctx.arc(bx,0,2.5,0,Math.PI*2);ctx.fill();});
  ctx.scale(1,1);
  // sangue che cola
  ctx.save(); ctx.scale(1/(1+squish*0.5), 1/(1-squish*0.6));
  const drip=Math.min(28,p*84);
  [-10,-3,5,12].forEach(bx=>_drip(bx,5,drip));
  // testa appiattita di lato
  ctx.fillStyle='rgba(175,175,175,0.9)'; ctx.beginPath(); ctx.ellipse(26,2,11,4+(1-squish)*4,0,0,Math.PI*2); ctx.fill();
  _xeyes(30,2); _tongue(34,6);
  _blood(Math.min(18,p*55));
  ctx.restore();
}

// ── ACID: affonda, si scioglie, ossa a galla ─────────────────────────────
function _animAcid(sx,sy,p){
  // p=0..1 nei 3 secondi post-morte
  // FASE 1 (0-0.30): piscina acida che ribolle intensamente, ultimi resti
  // FASE 2 (0.30-0.65): dissoluzione completa, ossa emergono dal basso
  // FASE 3 (0.65-1.0): scheletro/ossa galleggiano in superficie

  ctx.save();

  // ── piscina acida sempre visibile ────────────────────────────────────────
  const glow=0.6+0.4*Math.sin(T*0.18);
  ctx.shadowColor='#76FF03'; ctx.shadowBlur=20*glow+p*15;
  ctx.fillStyle='rgba(20,90,0,0.75)';
  ctx.beginPath(); ctx.ellipse(sx,sy,65+p*10,18+p*6,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=`rgba(80,${Math.floor(200+55*glow)},10,0.85)`;
  ctx.beginPath(); ctx.moveTo(sx-65,sy-8);
  for(let i=0;i<=130;i+=8) ctx.lineTo(sx-65+i, sy-12+Math.sin((i+T*4)*0.22)*5+Math.sin((i*0.08+T*0.15))*3);
  ctx.lineTo(sx+65,sy+12); ctx.lineTo(sx-65,sy+12); ctx.closePath(); ctx.fill();
  ctx.shadowBlur=0;
  // bollicine acide — tante
  for(let i=0;i<10;i++){
    const bph=((T*1.8+i*12)%80)/80;
    const bx=sx+Math.sin(i*2.7)*52;
    const by=sy - bph*(55+p*25);
    const br=2+bph*5+Math.sin(i*1.3)*1.5;
    ctx.fillStyle=`rgba(100,255,30,${0.7*(1-bph)})`;
    ctx.beginPath(); ctx.arc(bx,by,br,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=`rgba(220,255,160,${0.45*(1-bph)})`;
    ctx.beginPath(); ctx.arc(bx-br*.3,by-br*.3,br*.35,0,Math.PI*2); ctx.fill();
  }

  // FASE 1: residui della carcassa che spariscono
  if(p < 0.30){
    const pp=p/0.30;
    ctx.globalAlpha=Math.max(0,1-pp*0.9);
    ctx.fillStyle=`rgb(${Math.floor(80*(1-pp))},${Math.floor(120+100*pp)},0)`;
    ctx.save(); ctx.translate(sx,sy); ctx.scale(1-pp*0.4, 1-pp*0.6);
    ctx.beginPath(); ctx.ellipse(0,0,18,12,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(18,-1,12,0,Math.PI*2); ctx.fill();
    if(pp<0.7){ _xeyes(22,-4); }
    ctx.restore();
    ctx.globalAlpha=1;
  }

  // FASE 2: ossa emergono dal fondo dell'acido con effetto "fluttuante"
  if(p > 0.28 && p < 0.70){
    const pp=(p-0.28)/0.42;
    const emergeY = sy + 30 - pp*45; // salgono da sotto
    ctx.globalAlpha=Math.min(1,pp*1.5);
    ctx.strokeStyle=`rgba(220,210,185,0.85)`; ctx.lineWidth=2.5; ctx.lineCap='round';
    ctx.save(); ctx.translate(sx, emergeY);
    // colonna vertebrale
    ctx.beginPath(); ctx.moveTo(-20,0); ctx.lineTo(20,0); ctx.stroke();
    // coste
    [-14,-7,0,7,14].forEach(rx=>{
      ctx.beginPath(); ctx.moveTo(rx,-1);
      ctx.bezierCurveTo(rx-9,-7, rx+9,-7, rx,0); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(rx,1);
      ctx.bezierCurveTo(rx-9,7, rx+9,7, rx,0); ctx.stroke();
    });
    // bacino
    ctx.beginPath(); ctx.ellipse(0,5,8,5,0,0,Math.PI*2); ctx.stroke();
    ctx.restore();
    ctx.globalAlpha=1;
  }

  // FASE 3: scheletro completo sulla superficie + teschio
  if(p > 0.62){
    const pp=(p-0.62)/0.38;
    const floatY=sy - 8 + Math.sin(T*0.04)*3; // galleggia leggermente
    ctx.globalAlpha=Math.min(1,pp*1.8);
    ctx.strokeStyle='rgba(225,215,190,0.92)'; ctx.lineWidth=2.5; ctx.lineCap='round';
    ctx.fillStyle='rgba(225,215,190,0.92)';

    ctx.save(); ctx.translate(sx, floatY);
    // colonna
    ctx.beginPath(); ctx.moveTo(-22,0); ctx.lineTo(22,0); ctx.stroke();
    // coste (più dettagliate)
    [-16,-8,0,8,16].forEach(rx=>{
      ctx.beginPath(); ctx.moveTo(rx,-2);
      ctx.bezierCurveTo(rx-11,-9,rx+11,-9,rx,0); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(rx,2);
      ctx.bezierCurveTo(rx-11,9,rx+11,9,rx,0); ctx.stroke();
    });
    // bacino + zampe
    ctx.beginPath(); ctx.ellipse(0,7,10,6,0,0,Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-6,13); ctx.lineTo(-10,26); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(6,13); ctx.lineTo(10,26); ctx.stroke();
    // zampe anteriori
    ctx.beginPath(); ctx.moveTo(18,-2); ctx.lineTo(32,8); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-18,-2); ctx.lineTo(-32,8); ctx.stroke();
    // teschio (orecchie da topo)
    ctx.beginPath(); ctx.arc(0,-18,11,0,Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.arc(-7,-28,6,0,Math.PI*2); ctx.stroke(); // orecchio sx
    ctx.beginPath(); ctx.arc(7,-28,6,0,Math.PI*2); ctx.stroke();  // orecchio dx
    // occhi vuoti
    ctx.beginPath(); ctx.arc(-4,-19,2.5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(4,-19,2.5,0,Math.PI*2); ctx.fill();
    // denti
    ctx.fillStyle='rgba(225,215,190,0.8)';
    [-3,0,3].forEach(tx=>{ctx.beginPath();ctx.rect(tx-1.2,-11,2.4,4);ctx.fill();});
    // bollicine sparse attorno allo scheletro
    if(pp<0.85){
      ctx.globalAlpha=(1-pp/0.85)*0.6;
      for(let i=0;i<4;i++){
        const bx=(i-1.5)*18, bph=((T*1.5+i*15)%60)/60;
        ctx.fillStyle='rgba(100,255,40,0.7)';
        ctx.beginPath(); ctx.arc(bx,-bph*30,3+bph*3,0,Math.PI*2); ctx.fill();
      }
    }
    ctx.restore();
    ctx.globalAlpha=1;
    // testo finale
    if(pp>0.55){
      ctx.globalAlpha=(pp-0.55)/0.45;
      ctx.font='bold 13px Arial Black'; ctx.textAlign='center';
      ctx.shadowColor='#003300'; ctx.shadowBlur=8;
      ctx.fillStyle='#AAFFAA';
      ctx.fillText('☠ DISSOLTO ☠', sx, floatY-52);
      ctx.shadowBlur=0;
      ctx.globalAlpha=1;
    }
  }
  ctx.restore();
}

// ── BEAR: schiacciato dalla trappola ─────────────────────────────────────
function _animBear(sx,sy,p){
  ctx.translate(sx,sy);
  const cr=Math.min(1,p*5); // schiacciamento istantaneo
  // top e bottom
  ctx.fillStyle='#9E9E9E';
  ctx.beginPath(); ctx.ellipse(0,-12-cr*4,15,7,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(0,12+cr*4,15,7,0,0,Math.PI*2); ctx.fill();
  // zona schiacciata
  ctx.fillStyle='rgba(160,0,0,0.9)';
  ctx.beginPath(); ctx.ellipse(0,0,16,3-cr*1.5,0,0,Math.PI*2); ctx.fill();
  // occhi che schizzano fuori — aumentano col tempo
  const eDist=Math.min(28,cr*28+p*8);
  ctx.fillStyle='white'; ctx.strokeStyle='#111'; ctx.lineWidth=1.5;
  [[-eDist,-9],[eDist,-9]].forEach(([ex,ey])=>{
    const er=5+cr*3; ctx.beginPath(); ctx.arc(ex,ey,er,0,Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.fillStyle='#111'; ctx.beginPath(); ctx.arc(ex,ey,er*0.5,0,Math.PI*2); ctx.fill(); ctx.fillStyle='white';
  });
  // testa tutta deformata in su
  ctx.fillStyle='#BDBDBD'; ctx.beginPath(); ctx.ellipse(14,-24-cr*6,9,7,0.3,0,Math.PI*2); ctx.fill();
  _xeyes(18,-24-cr*6); _tongue(22,-18-cr*4);
  // sangue che sprizza lateralmente (prime battute)
  if(p<0.3){
    const sp=(p/0.3);
    ctx.fillStyle='rgba(180,0,0,0.85)';
    [[-25,0],[-30,-5],[25,0],[30,-5]].forEach(([bx,by])=>{
      ctx.beginPath(); ctx.arc(bx*sp,by,3,0,Math.PI*2); ctx.fill();
    });
  }
  _blood(Math.min(20,p*60));
}

// ── GROUND: pancake ──────────────────────────────────────────────────────
function _animGround(sx,sy,p){
  ctx.translate(sx, GY-2);
  // corpo sempre più piatto
  const flatness=Math.min(1,p*3);
  ctx.fillStyle='rgba(120,120,120,0.92)';
  ctx.beginPath(); ctx.ellipse(0,0,20+flatness*14,12-flatness*8,0,0,Math.PI*2); ctx.fill();
  _blood(Math.min(24,p*72));
  // testa piatta di lato
  ctx.fillStyle='rgba(175,175,175,0.9)';
  ctx.beginPath(); ctx.ellipse(28+flatness*4,1,12+flatness*4,4-flatness*2,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(239,154,154,0.85)'; ctx.beginPath(); ctx.arc(26,-5,4.5,0,Math.PI*2); ctx.fill();
  _xeyes(32+flatness*4,1); _tongue(38+flatness*4,4);
  // stelline rotanti
  _stars(p, 30+flatness*10);
}

// ── BIRD: beccato ─────────────────────────────────────────────────────────
function _animBird(sx,sy,p){
  ctx.translate(sx,sy);
  if(p<0.38){
    const pp=p/0.38;
    // topo attaccato
    _body(); _head(18,-1); _xeyes(22,-5);
    // piume che volano via
    ctx.fillStyle='#607D8B';
    for(let i=0;i<5;i++){
      const a=pp*Math.PI*3+i*Math.PI*.4;
      const d=pp*35+i*5;
      ctx.save(); ctx.translate(Math.cos(a)*d,Math.sin(a)*d); ctx.rotate(a);
      ctx.beginPath(); ctx.ellipse(0,0,7,2.5,0,0,Math.PI*2); ctx.fill();
      ctx.restore();
    }
    // uccello che becca dall'alto
    const peckT=Math.sin(pp*Math.PI*5);
    const bx=14, by=-35+peckT*28;
    ctx.save(); ctx.translate(bx,by);
    ctx.fillStyle='#37474F'; ctx.beginPath(); ctx.ellipse(-4,0,12,7,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(6,0,8,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#FF8F00';
    ctx.beginPath(); ctx.moveTo(13,-1); ctx.lineTo(22,1+peckT*3); ctx.lineTo(13,4); ctx.fill();
    ctx.restore();
    _blood(Math.min(12,pp*36));
  } else {
    const pp=(p-0.38)/0.62;
    // topo steso, piume sparse
    ctx.rotate(Math.PI*.48);
    _body(); _head(18,-1); _xeyes(22,-5); _tongue(28,8); _legs();
    ctx.fillStyle='rgba(96,125,139,0.8)';
    [[-18,16],[2,23],[18,15],[-6,12],[11,20],[-12,18]].forEach(([fx,fy])=>{
      ctx.save(); ctx.translate(fx,fy); ctx.rotate(fx*.1);
      ctx.beginPath(); ctx.ellipse(0,0,7,2.5,0,0,Math.PI*2); ctx.fill();
      ctx.restore();
    });
    _blood(16);
    // uccello vola via
    const bFade=Math.max(0,1-pp*1.4);
    if(bFade>0){
      const bx=50+pp*120, by=-55-pp*35;
      ctx.save(); ctx.globalAlpha=bFade;
      ctx.fillStyle='#455A64';
      ctx.beginPath(); ctx.ellipse(bx,by,10,5,0,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(bx-8,by-3,7,3,-.3,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(bx+8,by-3,7,3,.3,0,Math.PI*2); ctx.fill();
      ctx.restore();
    }
  }
}

// ─── PHYSICS ─────────────────────────────────────────────────────────────
function spawnMouse(){
  const rad=angle*Math.PI/180,spd=power*0.17;
  return{wx:CANNON_WX+Math.cos(rad)*70,wy:CANNON_WX_Y+Math.sin(rad)*70,
    vx:Math.cos(rad)*spd,vy:Math.sin(rad)*spd,r:14,trail:[],alive:true,settled:false,maxDist:0};
}

function updateMouse(m){
  if(!m||!m.alive) return;
  if(m.inAcid > 0){
    m.inAcid--;
    m.trail.push({wx:m.wx,wy:m.wy});
    if(m.trail.length>18) m.trail.shift();
    m.vx *= 0.84;
    m.vy = m.vy * 0.68 + 1.6;
    m.wx += m.vx;
    m.wy += m.vy;
    m.wy = Math.min(m.wy, GY - 8);
    if(m.wx > m.maxDist) m.maxDist = m.wx;
    if(m.inAcid === 0){ killMouse(m,'ACID'); }
    return;
  }
  m.trail.push({wx:m.wx,wy:m.wy});
  if(m.trail.length>18) m.trail.shift();
  m.vy+=0.10;        // gravità ridotta — volo più lungo e dinamico
  m.vx*=0.999;       // resistenza aria minima orizzontale
  // cap velocità verticale su (1/3 in meno rispetto a prima)
  if(m.vy < -15) m.vy = -15;
  m.wx+=m.vx; m.wy+=m.vy;
  if(m.wx>m.maxDist) m.maxDist=m.wx;
  // walls
  if(m.wx<0){m.wx=0;m.vx*=-0.5;}
  // soffitto massimo (50% più basso = -350 invece di -700)
  const CEIL_Y = -350;
  if(m.wy < CEIL_Y){ m.wy = CEIL_Y; m.vy = Math.abs(m.vy)*0.25; }
  // ground
  if(m.wy+m.r>=GY){
    const spd=Math.hypot(m.vx,m.vy);
    if(spd>18){killMouse(m,'GROUND');return;}  // muore solo con impatto molto violento
    m.wy=GY-m.r; m.vy*=-0.55; m.vx*=0.90;    // rimbalza sul suolo perdendo poco
    burst(m.wx,GY,'rgba(80,30,0,0.6)',4,2);
    sfxGround();
    if(spd<1.2){m.vx=0;m.vy=0;m.settled=true;}
  }
  // obstacles
  for(const o of obstacles){
    const kill=KILL_TYPES.includes(o.type);
    const bounce=BOUNCE_TYPES.includes(o.type);
    let ocx=o.cx+(o.type==='CLOUD'?o._drift:0);
    let ocy=o.cy;
    if(o.type==='CHAINSAW'){
      const swingA=Math.sin(T*0.025+o.cx*0.008)*0.55;
      const chainLen=o._chainLen||160;
      ocx=o.cx+Math.sin(swingA)*chainLen;
      ocy=o.cy+28+Math.cos(swingA)*chainLen;
    }
    const dist=Math.hypot(m.wx-ocx,m.wy-ocy);
    if(dist<m.r+o.r){
      if(kill&&m.alive){
        if(o.type==='ACID' && !m.inAcid){
          // morte lenta: 120 frame = 2 secondi
          m.inAcid = 120;
          m.acidEntryY = m.wy;
          sfxScream();
          // particelle iniziali di scioglimento
          for(let i=0;i<12;i++) particles.push({wx:m.wx+(Math.random()-.5)*30,wy:m.wy,vx:(Math.random()-.5)*2,vy:-Math.random()*3-1,life:1,color:'#76FF03',size:4+Math.random()*6,type:'bubble'});
          continue; // non uccide subito
        } else if(o.type!=='ACID'){
          killMouse(m,o.type); return;
        }
      }
      else if(bounce){
        const nx=(m.wx-ocx)/dist,ny=(m.wy-ocy)/dist;
        const dot=m.vx*nx+m.vy*ny;
        if(o.type==='CLOUD'){
          m.vx = Math.max(Math.abs(m.vx)*1.05, 4);
          m.vy = -Math.abs(m.vy)*1.0;
          if(Math.abs(m.vy)<3) m.vy=-3;
          sfxCloud();
        } else if(o.type==='BALLOON'){
          m.vx = Math.min(15, Math.abs(m.vx)*1.05 + 0.5);
          m.vy = Math.max(-10, -Math.abs(m.vy)*0.75 - 1.5);
          sfxBalloon();
        } else {
          const bf=o.type==='SPRING'?1.6:1.35;
          let newVx=(m.vx-2*dot*nx)*bf, newVy=(m.vy-2*dot*ny)*bf;
          m.vx=Math.max(2, Math.abs(newVx));
          m.vy=newVy;
          if(o.type==='SPRING') sfxSpring(); else sfxMushroom();
        }
        m.wx=ocx+nx*(m.r+o.r+2); m.wy=ocy+ny*(m.r+o.r+2);
        const bc={SPRING:'#29B6F6',MUSHROOM:'#FF7043',CLOUD:'#B39DDB',BALLOON:'#FF9800'};
        const bl={SPRING:'⚡ BOING!',MUSHROOM:'🍄 BUMP!',CLOUD:'☁️ WHOOSH!',BALLOON:'🎈 GONFIATO!'};
        burst(m.wx,m.wy,bc[o.type]||'#FFD',8,3);
        texts.push({wx:m.wx,wy:m.wy-20,text:bl[o.type]||'',color:bc[o.type]||'#fff',life:0.9,vy:-1.3,size:16});
      }
    }
  }
  // atterraggio sicuro
  if(m.settled && !animState){
    m.alive = false;
    const dist=Math.round(m.wx/METER);
    lastDist=dist; if(dist>bestDist) bestDist=dist;
    texts.push({wx:m.wx,wy:m.wy-50,text:'😅 SALVO!',color:'#88FF88',life:1.5,vy:-1.5,size:22});
    animState = { phase:'safe', wx:m.wx, wy:m.wy, t:0, dur:180 };
    sfxSafe();
  }
}

// ─── PARTICLES (world space) ──────────────────────────────────────────────
function updateParticles(){
  particles.forEach(p=>{
    p.wx+=p.vx; p.wy+=p.vy;
    if(p.type==='bubble') p.vy-=0.07; else if(p.type!=='ring') p.vy+=0.2;
    if(p.type==='chunk') p.rot+=p.rs;
    if(p.type==='ring') p.size+=p.grow;
    if(p.wy>GY&&p.type!=='bubble'&&p.type!=='ring'){p.vy*=-0.3;p.vx*=0.7;}
    p.life-=0.02;
  });
  particles=particles.filter(p=>p.life>0);
}

function drawParticles(){
  particles.forEach(p=>{
    const sx=p.wx-cam.x;
    if(sx<-20||sx>W+20) return;
    ctx.save(); ctx.globalAlpha=Math.max(0,p.life);
    ctx.fillStyle=p.color; ctx.strokeStyle=p.color;
    if(p.type==='ring'){ctx.globalAlpha=p.life*0.5;ctx.lineWidth=3;ctx.beginPath();ctx.arc(sx,p.wy,p.size,0,Math.PI*2);ctx.stroke();}
    else if(p.type==='chunk'){ctx.translate(sx,p.wy);ctx.rotate(p.rot||0);ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size);}
    else{ctx.beginPath();ctx.arc(sx,p.wy,p.size*Math.max(0.1,p.life),0,Math.PI*2);ctx.fill();}
    ctx.restore();
  });
}

// ─── HUD (screen space) ──────────────────────────────────────────────────
function drawHUD() {
  // DISTANCE (big center-top)
  const curDist = mouse&&mouse.alive ? Math.round(mouse.wx/METER) : lastDist;
  ctx.textAlign='center';
  ctx.font='bold 38px Arial Black';
  ctx.shadowColor='#FF0000'; ctx.shadowBlur=15;
  ctx.fillStyle='white';
  ctx.fillText(curDist+'m', W/2, 44);
  ctx.shadowBlur=0;
  ctx.font='13px Arial'; ctx.fillStyle='#888';
  ctx.fillText(t('distance'), W/2, 60);

  // SPEED
  if(mouse&&mouse.alive){
    const spd=Math.round(Math.hypot(mouse.vx,mouse.vy)*8);
    ctx.font='bold 18px Arial'; ctx.fillStyle='#FF9999'; ctx.textAlign='left';
    ctx.fillText(`${spd} km/h`, 12, 28);
  }

  // BEST
  ctx.textAlign='right'; ctx.font='13px Arial'; ctx.fillStyle='#FFD700';
  ctx.fillText(`⭐ ${t('best')}: ${bestDist}m`, W-10, 22);
  ctx.fillStyle='#FF9999';
  ctx.fillText(`💀 ${kills}  +${score}⭐`, W-10, 42);

  // MICE LEFT
  ctx.textAlign='left'; ctx.font='18px Arial'; ctx.fillStyle='#FF9999';
  for(let i=0;i<mLeft;i++) ctx.fillText('🐭', 10+i*26, 55);

  // POWER BAR
  if(charging){
    ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(W/2-80,H-36,160,22);
    ctx.fillStyle='rgba(255,255,255,0.15)'; ctx.fillRect(W/2-80,H-36,160*power/100,22);
    const pw=Math.floor(power);
    const col=pw<40?'#4CAF50':pw<75?'#FFEB3B':'#F44336';
    ctx.fillStyle=col; ctx.fillRect(W/2-78,H-34,156*power/100,18);
    ctx.strokeStyle='#555'; ctx.lineWidth=1; ctx.strokeRect(W/2-80,H-36,160,22);
    ctx.fillStyle='white'; ctx.font='bold 13px Arial'; ctx.textAlign='center';
    ctx.fillText(t('power')+'  '+pw+'%',W/2,H-21);
  }

  // ANGLE SELECTOR (visibile solo a topo fermo / prima del lancio)
  if(!mouse||!mouse.alive){
    const deg = Math.abs(angle); // mostro come angolo positivo (5-88)
    const cx=110, cy=H-55;
    // arco decorativo
    ctx.strokeStyle='rgba(255,80,80,0.3)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(cx,cy,36,Math.PI,Math.PI*1.5,false); ctx.stroke();
    // indicatore angolo sull'arco
    const arcAngle = Math.PI + (deg/90)*Math.PI*0.5;
    const ix=cx+Math.cos(arcAngle)*36, iy=cy+Math.sin(arcAngle)*36;
    ctx.fillStyle='#FF5252'; ctx.beginPath(); ctx.arc(ix,iy,5,0,Math.PI*2); ctx.fill();
    // testo gradi
    ctx.fillStyle='white'; ctx.font='bold 28px Arial Black'; ctx.textAlign='center';
    ctx.shadowColor='#FF0000'; ctx.shadowBlur=10;
    ctx.fillText(deg+'°', cx, cy+10);
    ctx.shadowBlur=0;
    ctx.fillStyle='#888'; ctx.font='11px Arial';
    ctx.fillText(t('angle'), cx, cy+26);
  }

  // SHOP BUTTON
  ctx.fillStyle=showShop?'#FFD700':'#666'; ctx.fillRect(W-135, 8, 37, 25);
  ctx.fillStyle=showShop?'#000':'#fff'; ctx.font='18px Arial'; ctx.textAlign='center';
  ctx.fillText('💰', W-116.5, 26);

  // LEADERBOARD BUTTON
  ctx.fillStyle=showLeaderboard?'#FFD700':'#666'; ctx.fillRect(W-90, 8, 37, 25);
  ctx.fillStyle=showLeaderboard?'#000':'#fff'; ctx.font='18px Arial'; ctx.textAlign='center';
  ctx.fillText('🏆', W-71.5, 26);

  // SETTINGS BUTTON
  ctx.fillStyle=settingsOpen?'#FFD700':'#666'; ctx.fillRect(W-45, 8, 37, 25);
  ctx.fillStyle=settingsOpen?'#000':'#fff'; ctx.font='18px Arial'; ctx.textAlign='center';
  ctx.fillText('⚙️', W-26.5, 26);
}

// ─── NAME INPUT SCREEN ───────────────────────────────────────────────────
function drawNameInputScreen(){
  if(!playerNameScreenOpen) {
    namePromptShown = false;
    return;
  }

  // Show prompt once to get name from user
  if(!namePromptShown) {
    namePromptShown = true;
    const promptMsg = t('enter_name_q') + ' (' + t('enter_name_placeholder') + ')';
    const result = prompt('👤 ' + t('enter_name') + '\n\n' + promptMsg);
    if(result && result.trim()) {
      playerName = result.trim().substring(0, 20);
      localStorage.setItem('playerName', playerName);
      playerNameScreenOpen = false;
      charSelectOpen = true;
      console.log('Player name set:', playerName);
    } else if(result !== null) {
      // User clicked OK but entered empty - ask again
      namePromptShown = false;
    }
    // If user clicked Cancel (result === null), keep the screen open for retry
    return;
  }

  if(charSelectOpen) {
    e.preventDefault();

  }
});

// ─── AUDIO ───────────────────────────────────────────────────────────────
let audioCtx = null;
function initAudio(){
  if(audioCtx) return;
  try{ audioCtx = new (window.AudioContext||window.webkitAudioContext)(); playMusic(); }catch(e){}
}
function _note(f,t,d,vol,type){
  if(!audioCtx||f<=0||!sfxEnabled) return;
  const o=audioCtx.createOscillator(), g=audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.type=type||'sine'; o.frequency.setValueAtTime(f,t);
  g.gain.setValueAtTime(vol||0.06,t);
  g.gain.exponentialRampToValueAtTime(0.0001,t+Math.max(d,0.03));
  o.start(t); o.stop(t+d+0.03);
}
function _sweep(f1,f2,t,d,vol,type){
  if(!audioCtx||!sfxEnabled) return;
  const o=audioCtx.createOscillator(), g=audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.type=type||'sine'; o.frequency.setValueAtTime(f1,t);
  o.frequency.exponentialRampToValueAtTime(f2,t+d);
  g.gain.setValueAtTime(vol||0.15,t);
  g.gain.exponentialRampToValueAtTime(0.0001,t+d);
  o.start(t); o.stop(t+d+0.03);
}
function _noise(t,d,vol){
  if(!audioCtx||!sfxEnabled) return;
  const len=Math.ceil(audioCtx.sampleRate*Math.max(d,0.02));
  const buf=audioCtx.createBuffer(1,len,audioCtx.sampleRate);
  const data=buf.getChannelData(0);
  for(let i=0;i<len;i++) data[i]=(Math.random()*2-1);
  const src=audioCtx.createBufferSource(), g=audioCtx.createGain();
  src.buffer=buf; src.connect(g); g.connect(audioCtx.destination);
  g.gain.setValueAtTime(vol||0.2,t);
  g.gain.exponentialRampToValueAtTime(0.0001,t+d);
  src.start(t); src.stop(t+d+0.02);
}

// ── MUSICA CHILL AMBIENTALE (pentatonica Em, archi lenti con eco) ─────────
// Em pentatonica: E3=165, G3=196, A3=220, B3=247, D4=294, E4=330, G4=392, A4=440
const TUNE=[
  [330,.55],[0,.2],[440,.45],[0,.2],[392,.5],[0,.2],[330,.4],[0,.3],
  [294,.5],[0,.2],[392,.45],[0,.2],[330,.5],[0,.2],[247,.55],[0,.4],
  [247,.5],[0,.2],[330,.45],[0,.2],[294,.5],[0,.2],[262,.4],[0,.3],
  [220,.5],[0,.2],[294,.45],[0,.2],[247,.5],[0,.25],[220,.7],[0,.5],
  [392,.5],[0,.2],[523,.45],[0,.2],[494,.5],[0,.2],[440,.4],[0,.3],
  [392,.5],[0,.2],[440,.45],[0,.2],[494,.5],[0,.2],[392,.7],[0,.5],
  [330,.5],[0,.2],[440,.45],[0,.2],[494,.5],[0,.2],[440,.4],[0,.25],
  [392,.5],[0,.2],[330,.45],[0,.2],[247,.4],[0,.2],[220,.9],[0,.7],
];
const BASS=[
  [82,.9],[0,.45],[110,.45],[0,.45],[82,.9],[0,.9],
  [73,.9],[0,.9],[98,.9],[0,.9],
  [87,.9],[0,.9],[82,.9],[0,.9],
  [82,1.35],[0,.45],[73,.45],[0,.45],[82,.9],[0,.9],
];
function playMusic(){
  if(!audioCtx) return;
  let t=audioCtx.currentTime+0.2, tot=0;
  TUNE.forEach(([f,d])=>{
    _note(f,t,d*.9,.055,'sine');
    if(f>0) _note(f,t+.2,d*.7,.02,'sine'); // eco
    t+=d; tot+=d;
  });
  t=audioCtx.currentTime+0.2;
  BASS.forEach(([f,d])=>{ _note(f,t,d*.85,.038,'triangle'); t+=d; });
  setTimeout(()=>{ try{ if(audioCtx) playMusic(); }catch(e){} }, (tot-.5)*1000);
}

  gMain.gain.setValueAtTime(.38,t); gMain.gain.exponentialRampToValueAtTime(.0001,t+.5);

  _sweep(650,820,t+.1,.16,.3,'sine');      // "-HOO-"
  _sweep(820,320,t+.22,.4,.25,'sine');     // "-ooo"
  _note(440,t,.15,.12,'triangle');
}

// ─── MAIN LOOP ────────────────────────────────────────────────────────────
function loop(){
  T++; sawRot+=0.07;

  const inAnim = animState !== null;

  if(!inAnim){
    // input angolo
    if(T%3===0&&!charging&&(!mouse||!mouse.alive)){
      if(keysHeld['ArrowUp']||keysHeld['ArrowLeft']) angle=Math.max(-88,angle-1);
      if(keysHeld['ArrowDown']||keysHeld['ArrowRight']) angle=Math.min(-5,angle+1);
    }
    if(charging) power=Math.min(100,power+1.5);
    if(mouse) updateMouse(mouse);
  }

  if(mouse && mouse.alive && mouse.wx > maxGeneratedX - 1000) {
    genMore(maxGeneratedX);
  }
  obstacles = obstacles.filter(o => o.cx > cam.x - 500);

  // animazione avanza sempre
  if(animState){
    // Yahoo! esattamente quando inizia la fase vittoria (78%)
    if(animState.phase==='safe' && animState.t===Math.floor(animState.dur*0.78)) sfxYahoo();
    animState.t++;
    if(animState.phase === 'death') {
      animState.mvy = (animState.mvy || 0) + 0.35;
      animState.wy += animState.mvy;
      if(animState.wy > GY - 20) animState.wy = GY - 20;
    }
    if(animState.t >= animState.dur){
      // fine animazione: aggiungi cadavere persistente e pulisci
      if(animState.phase==='death')
        addDeathPose(animState.deathType, animState.wx, animState.wy, animState.mvx||0, animState.mvy||0);
      animState = null;
    }
  }

  updateAerials();
  updateCam();
  updateParticles();
  updateDeathPoses();
  texts.forEach(tx=>{tx.wy+=tx.vy;tx.life-=0.013;});
  texts=texts.filter(tx=>tx.life>0);

  let shx=0,shy=0;
  if(camShake.power>0){
    shx=(Math.random()-0.5)*camShake.power;
    shy=(Math.random()-0.5)*camShake.power*0.6;
    camShake.power=Math.max(0,camShake.power-1.2);
  }

  if(!gameOver&&mLeft<=0&&!inAnim&&(!mouse||!mouse.alive)&&particles.length<6) gameOver=true;

  ctx.save();
  ctx.clearRect(0,0,W,H);
  ctx.translate(shx,shy);

    ctx.save();
    ctx.translate(0, -Math.round(cam.y)); // camera verticale
    drawBG();
    drawFlash();
    drawGround();
    drawObstacles();
    drawParticles();
    drawDeathPoses();
    if(mouse) {
      switch(selectedChar) {
        case 'cat': drawCat(mouse); break;
        case 'monkey': drawMonkey(mouse); break;
        case 'pavel': drawPavel(mouse); break;
        default: drawMouse(mouse); break;
      }
    }
    drawCannon();
    drawAnimOverlay(); // animazione 3s sopra tutto
    drawTexts();       // testi in world space (seguono la camera)
    ctx.restore();

  ctx.restore();

  drawHUD();
  // barra progresso animazione
  if(animState && mLeft > 0){
    const prog = animState.t / animState.dur;
    ctx.save();
    ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(W/2-100,H-28,200,14);
    ctx.fillStyle=animState.phase==='safe'?'#88FF88':'#FF5252';
    ctx.fillRect(W/2-98,H-26,196*prog,10);
    ctx.fillStyle='rgba(255,255,255,0.7)'; ctx.font='10px Arial'; ctx.textAlign='center';
    ctx.fillText(animState.phase==='safe'?'CE LA FA... 😅':'MORT ACCIDENTE... 💀', W/2, H-18);
    ctx.restore();
  }
  drawSettings();
  drawNameInputScreen();
  drawCharSelect();
  drawLeaderboard();
  drawShop();
  if(gameOver) {
    if(!window._gameOverSaved) {
      addScore(lastDist, kills, score, selectedChar);
      window._gameOverSaved = true;
    }
    drawGameOver();
  }

  requestAnimationFrame(loop);
}
loop();

// ─── TELEGRAM MINI APP SETUP ──────────────────────────────────────────────
(function(){
  const tg = window.Telegram && window.Telegram.WebApp;
  if(tg){
    tg.ready();
    tg.expand();
    tg.setHeaderColor('#000000');
    tg.setBackgroundColor('#000000');
    // blocca orientamento portrait (Telegram Bot API 8.0+)
    if(tg.lockOrientation) tg.lockOrientation();
  }

  // ── canvas responsive scaling ──────────────────────────────────────────
  function fitCanvas(){
    const vw = window.innerWidth, vh = window.innerHeight;
    const scale = Math.min(vw / W, vh / H);
    canvas.style.transform = `scale(${scale})`;
  }
  window.addEventListener('resize', fitCanvas);
  fitCanvas();

  // ── touch device detection ─────────────────────────────────────────────
  const isTouch = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
  if(isTouch){
    document.getElementById('tctrl').style.display = 'flex';
  }

  // ── touch controls ─────────────────────────────────────────────────────
  const btnUp   = document.getElementById('btn-up');
  const btnDn   = document.getElementById('btn-dn');
  const btnFire = document.getElementById('btn-fire');
  const btnRst  = document.getElementById('btn-restart');

  function setKey(code, val){ keysHeld[code] = val; }

  btnUp.addEventListener('touchstart',  e=>{ e.preventDefault(); setKey('ArrowUp',true);   }, {passive:false});
  btnUp.addEventListener('touchend',    e=>{ e.preventDefault(); setKey('ArrowUp',false);  }, {passive:false});
  btnDn.addEventListener('touchstart',  e=>{ e.preventDefault(); setKey('ArrowDown',true); }, {passive:false});
  btnDn.addEventListener('touchend',    e=>{ e.preventDefault(); setKey('ArrowDown',false);}, {passive:false});

  btnFire.addEventListener('touchstart', e=>{
    e.preventDefault(); initAudio();
    if(!gameOver) startCharge();
  }, {passive:false});
  btnFire.addEventListener('touchend', e=>{ e.preventDefault(); shoot(); }, {passive:false});

  btnRst.addEventListener('touchstart', e=>{ e.preventDefault(); restart(); }, {passive:false});
  btnRst.addEventListener('click', ()=>restart());

  // mostra/nasconde pulsante restart in base allo stato
  const _origDGO = drawGameOver;
  drawGameOver = function(){
    _origDGO();
    if(isTouch) btnRst.style.display = 'block';
  };
  const _origRestart = restart;
  restart = function(){
    _origRestart();
    if(isTouch) btnRst.style.display = 'none';
  };

  // canvas touch → spara
  canvas.addEventListener('touchstart', e=>{
    if(charSelectOpen || settingsOpen) { e.preventDefault(); e.stopPropagation(); return; }
    e.preventDefault(); initAudio();
    if(!gameOver) startCharge();
  }, {passive:false});
  canvas.addEventListener('touchend', e=>{
    if(charSelectOpen || settingsOpen) { e.preventDefault(); e.stopPropagation(); return; }
    e.preventDefault(); shoot();
  }, {passive:false});
})();

// ─── SPLASH SCREEN ────────────────────────────────────────────────────────
(function(){
  const splash = document.getElementById('splash');
  const img = splash.querySelector('img');
  let imgLoaded = false, minTimePassed = false;

  function hideSplash(){
    if(!imgLoaded || !minTimePassed) return;
    splash.classList.add('fade-out');
    setTimeout(()=>{ splash.style.display='none'; }, 650);
  }

  img.addEventListener('load',  ()=>{ imgLoaded=true;  hideSplash(); });
  img.addEventListener('error', ()=>{ imgLoaded=true;  hideSplash(); });

  setTimeout(()=>{ minTimePassed=true; hideSplash(); }, 2000);

  // abilita il tap-per-chiudere solo dopo 600ms — evita che il tocco
  // di apertura della mini app su Telegram propaghi e chiuda subito lo splash
  setTimeout(()=>{
    splash.addEventListener('pointerdown', ()=>{ minTimePassed=true; hideSplash(); });
  }, 600);
})();
</script>
